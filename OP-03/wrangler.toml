# Legacy OP-03 Worker configuration. The browser client uses the shared,
# hardened Worker in ../OPERATOR. Do not deploy this file over that service.
# The maintained deployment configuration is ../OPERATOR/wrangler.toml.

name = "beflix-call-op03-legacy-do-not-deploy"
main = "worker.js"
compatibility_date = "2024-09-01"

# ---- Durable Object: one instance per room code ----
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

# ---- Variables ----
# TURN server URLs (comma-separated). Leave empty for STUN-only (direct).
# If you run your own coturn, or use a provider that gives you a static URL
# with the REST/HMAC scheme, put the turn: / turns: URLs here.
[vars]
TURN_URLS = ""        # e.g. "turn:turn.example.com:3478,turns:turn.example.com:5349"

# ---- Secret (set via CLI, NOT here) ----
# wrangler secret put TURN_SECRET
# This is the coturn "static-auth-secret". The Worker derives short-lived
# per-session credentials from it; the secret itself never reaches the client.
