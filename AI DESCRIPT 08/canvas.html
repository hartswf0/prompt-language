<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>FIELD — thinking canvas</title>
<style>
  :root{
    --bg:#fff;--ink:#000;--paper:#fafaf8;--panel:#f4f4f0;
    --mut:#5a5a55;--faint:#8c8c86;--rule:#dedad0;--rule2:#c8c4ba;
    --teal:#0f6e56;--teal-bg:#e1f5ee;--blue:#185fa5;--blue-bg:#e6f1fb;
    --amber:#854f0b;--amber-bg:#faeeda;--red:#a32d2d;--red-bg:#fcebeb;
    --mono:'IBM Plex Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;border-radius:0!important;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
  button,input,textarea{font-family:inherit;font-size:inherit;color:inherit}
  button{background:none;border:none;cursor:pointer}
  ::selection{background:var(--amber-bg)}
  .sq{display:inline-block;width:7px;height:7px;flex:none}
  .sq.insight{background:var(--teal)}.sq.tension{background:var(--red)}.sq.sowhat{background:var(--blue)}.sq.missing{background:var(--amber)}

  /* top bar */
  .top{display:flex;align-items:center;gap:6px;border-bottom:2px solid var(--ink);padding:7px 9px;flex:none;background:var(--bg);z-index:30}
  .top .logo{font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-right:4px}
  .modes{display:flex;border:1.5px solid var(--ink)}
  .modes button{padding:5px 11px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);border-right:1.5px solid var(--ink)}
  .modes button:last-child{border-right:none}
  .modes button[aria-pressed="true"]{background:var(--ink);color:var(--bg);font-weight:700}
  .top .spacer{flex:1}
  .top .util{display:flex;gap:5px;align-items:center}
  .top .util button{border:1px solid var(--rule2);padding:5px 8px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut)}
  .top .util button:active{background:var(--ink);color:var(--bg)}
  .top .util button.warn:active{background:var(--red);color:var(--bg)}
  .stat{font-size:9.5px;color:var(--faint);letter-spacing:.04em;white-space:nowrap}

  .stage{flex:1;position:relative;overflow:hidden}

  /* ===== DECK (search/read pool) ===== */
  .deck{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg)}
  .deck .search{display:flex;border-bottom:1.5px solid var(--ink);flex:none}
  .deck .search .mk{width:32px;display:flex;align-items:center;justify-content:center;border-right:1.5px solid var(--ink);flex:none}
  .deck .search .mk i{width:10px;height:10px;border:1.5px solid var(--ink);border-radius:50%!important;position:relative;display:block}
  .deck .search .mk i::after{content:"";position:absolute;width:6px;height:1.5px;background:var(--ink);transform:rotate(45deg);right:-5px;bottom:-1px}
  .deck .search input{flex:1;border:none;outline:none;padding:9px;font-size:13px;min-width:0;background:var(--bg)}
  .deck .filters{display:flex;gap:0;border-bottom:1px solid var(--rule);flex:none;overflow-x:auto;scrollbar-width:none}
  .deck .filters::-webkit-scrollbar{display:none}
  .deck .filters button{flex:none;padding:7px 9px;font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);border-right:1px solid var(--rule);white-space:nowrap}
  .deck .filters button .sq{margin-right:4px;vertical-align:1px}
  .deck .filters button.on{background:var(--ink);color:var(--bg)}
  .deck .pool{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .dcard{border-bottom:1px solid var(--rule);padding:8px 10px;display:flex;gap:8px;align-items:flex-start;cursor:pointer}
  .dcard:active{background:var(--paper)}
  .dcard.onboard{background:var(--teal-bg)}
  .dcard .dc-sq{padding-top:4px}
  .dcard .dc-main{flex:1;min-width:0}
  .dcard .dc-lede{font-size:12.5px;line-height:1.4;font-weight:500}
  .dcard .dc-meta{font-size:9px;color:var(--faint);letter-spacing:.04em;margin-top:3px}
  .dcard .dc-add{flex:none;width:26px;height:26px;border:1px solid var(--rule2);display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:15px;font-weight:700}
  .dcard .dc-add:active{background:var(--ink);color:var(--bg)}
  .dcard.onboard .dc-add{border-color:var(--teal);color:var(--teal)}
  .deck .hint{padding:7px 10px;font-size:9.5px;color:var(--faint);letter-spacing:.04em;border-bottom:1px solid var(--rule);background:var(--paper)}

  /* ===== CANVAS ===== */
  .canvas{position:absolute;inset:0;overflow:hidden;background:
    radial-gradient(circle at 1px 1px, var(--rule) 1px, transparent 0);
    background-size:22px 22px;touch-action:none}
  .world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
  svg.links{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;z-index:1}
  svg.links path{fill:none;stroke:var(--ink);stroke-width:1.4}
  svg.links path.sel{stroke:var(--red);stroke-width:2}
  svg.links .lkhit{stroke:transparent;stroke-width:14;pointer-events:stroke;cursor:pointer}
  .node{position:absolute;background:var(--bg);border:1.5px solid var(--ink);width:230px;z-index:2;box-shadow:3px 3px 0 rgba(0,0,0,.07)}
  .node.sel{outline:2px solid var(--red);outline-offset:1px;z-index:5}
  .node .nhead{display:flex;align-items:center;gap:5px;padding:5px 7px;border-bottom:1px solid var(--rule);cursor:grab;background:var(--panel)}
  .node .nhead .ntype{font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut)}
  .node .nhead .nid{font-size:8.5px;color:var(--faint);margin-left:auto}
  .node .nhead .nx{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--mut);margin-left:4px}
  .node .nhead .nx:active{color:var(--red)}
  .node .nbody{padding:7px 8px}
  .node .nlede{font-size:12px;line-height:1.4;font-weight:600}
  .node .nexp{font-size:10.5px;line-height:1.45;color:#2a2a28;margin-top:5px;display:none}
  .node.expanded .nexp{display:block}
  .node .nmeta{font-size:8.5px;color:var(--faint);margin-top:5px;letter-spacing:.03em;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .node .nmeta .bk{cursor:pointer;text-decoration:underline;color:var(--mut)}
  .node .nfoot{display:flex;border-top:1px solid var(--rule)}
  .node .nfoot button{flex:1;padding:4px;font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);border-right:1px solid var(--rule)}
  .node .nfoot button:last-child{border-right:none}
  .node .nfoot button:active{background:var(--ink);color:var(--bg)}
  /* link port */
  .node .port{position:absolute;right:-9px;top:50%;transform:translateY(-50%);width:17px;height:17px;border:1.5px solid var(--ink);background:var(--bg);cursor:crosshair;z-index:6;display:flex;align-items:center;justify-content:center}
  .node .port::after{content:"";width:6px;height:6px;background:var(--ink)}
  .node .port:active{background:var(--amber)}
  .node.linking .port{background:var(--amber)}
  /* transclusion (quoted card) */
  .node.trans{border-style:dashed;background:var(--paper)}
  .node.trans .nhead{background:var(--amber-bg)}
  .node .transref{font-size:8.5px;color:var(--amber);letter-spacing:.04em;padding:3px 7px;border-top:1px dashed var(--rule2)}

  .canvas .emptyhint{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);text-align:center;color:var(--faint);font-size:12px;letter-spacing:.04em;pointer-events:none;width:80%}
  .canvas .emptyhint b{color:var(--mut)}

  /* zoom + canvas tools */
  .ctools{position:absolute;right:10px;bottom:14px;display:flex;flex-direction:column;gap:5px;z-index:20}
  .ctools button{width:34px;height:34px;border:1.5px solid var(--ink);background:var(--bg);font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:2px 2px 0 rgba(0,0,0,.08)}
  .ctools button:active{background:var(--ink);color:var(--bg)}
  .ctools .zlbl{font-size:8px;text-align:center;color:var(--faint);letter-spacing:.02em}
  .linkmode-banner{position:absolute;left:50%;top:10px;transform:translateX(-50%);background:var(--amber);color:#fff;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;z-index:20;display:none}
  .linkmode-banner.show{display:block}

  /* ===== PLAYLISTS ===== */
  .play{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
  .play .ptop{display:flex;gap:6px;padding:8px 10px;border-bottom:1.5px solid var(--ink);flex:none;align-items:center}
  .play .ptabs{display:flex;gap:0;overflow-x:auto;flex:1;scrollbar-width:none}
  .play .ptabs::-webkit-scrollbar{display:none}
  .play .ptabs button{flex:none;padding:5px 10px;font-size:10.5px;letter-spacing:.04em;border:1px solid var(--rule2);border-right:none;color:var(--mut);white-space:nowrap}
  .play .ptabs button:last-child{border-right:1px solid var(--rule2)}
  .play .ptabs button.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .play .padd{flex:none;width:30px;height:30px;border:1.5px solid var(--ink);font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .play .padd:active{background:var(--ink);color:var(--bg)}
  .play .pbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .play .pmeta{padding:8px 10px;border-bottom:1px solid var(--rule);font-size:9.5px;color:var(--faint);letter-spacing:.04em;display:flex;align-items:center;gap:8px;background:var(--paper)}
  .play .pmeta .pname{font-size:12px;color:var(--ink);font-weight:700;letter-spacing:.02em}
  .play .pmeta .pren{color:var(--mut);text-decoration:underline;cursor:pointer}
  .play .pmeta .pdel{color:var(--red);text-decoration:underline;cursor:pointer;margin-left:auto}
  .pcard{border-bottom:1px solid var(--rule);padding:9px 10px;display:flex;gap:8px;align-items:flex-start}
  .pcard .pnum{font-size:10px;color:var(--faint);flex:none;min-width:20px;padding-top:2px}
  .pcard .pc-main{flex:1;min-width:0}
  .pcard .pc-lede{font-size:12.5px;line-height:1.4;font-weight:500}
  .pcard .pc-exp{font-size:10.5px;line-height:1.45;color:#2a2a28;margin-top:4px}
  .pcard .pc-meta{font-size:9px;color:var(--faint);margin-top:4px;letter-spacing:.03em}
  .pcard .pc-ord{display:flex;flex-direction:column;gap:2px;flex:none}
  .pcard .pc-ord button{width:22px;height:18px;border:1px solid var(--rule2);font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--mut)}
  .pcard .pc-ord button:active{background:var(--ink);color:var(--bg)}
  .play .pempty{padding:30px 18px;text-align:center;color:var(--faint);font-size:11.5px;letter-spacing:.04em}

  /* ===== READER (card detail overlay) ===== */
  .reader{position:fixed;inset:0;background:var(--bg);z-index:60;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .2s ease}
  .reader.open{transform:none}
  .reader .rbar{display:flex;align-items:center;gap:8px;border-bottom:2px solid var(--ink);padding:9px 11px;flex:none}
  .reader .rbar .rx{font-size:18px;width:28px}
  .reader .rbar .rt{font-size:9.5px;letter-spacing:.06em;color:var(--faint);text-transform:uppercase}
  .reader .rbar .rnav{margin-left:auto;display:flex;gap:4px}
  .reader .rbar .rnav button{border:1px solid var(--rule2);width:30px;height:28px;font-size:14px}
  .reader .rbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 50px}
  .reader .rl{padding:16px 16px 10px;font-size:17px;line-height:1.4;font-weight:700}
  .reader .rmeta{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .reader .pill{font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border:1px solid var(--rule2);color:var(--mut)}
  .reader .pill.src{border-color:var(--amber);color:var(--amber)}
  .reader .rsec{border-top:1.5px solid var(--ink);padding:13px 16px}
  .reader .rsec .rh{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);font-weight:700;margin-bottom:7px}
  .reader .rexp{font-size:13.5px;line-height:1.6}
  .reader .rgist textarea{width:100%;min-height:60px;border:1.5px solid var(--ink);padding:8px;font-size:13px;line-height:1.5;resize:vertical;background:var(--bg)}
  .reader .rlinks .lkitem{display:flex;gap:7px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--rule);cursor:pointer}
  .reader .rlinks .lkitem:last-child{border-bottom:none}
  .reader .rlinks .lkitem .dir{font-size:9px;color:var(--amber);flex:none;min-width:30px;letter-spacing:.04em;padding-top:2px}
  .reader .rlinks .lkitem .lktext{font-size:11.5px;line-height:1.4;color:#2a2a28}
  .reader .ract{display:flex;gap:6px;padding:13px 16px;flex-wrap:wrap}
  .reader .ract button{border:1.5px solid var(--ink);padding:7px 11px;font-size:10px;letter-spacing:.06em;text-transform:uppercase}
  .reader .ract button:active{background:var(--ink);color:var(--bg)}

  /* sheet (pick playlist) */
  .sheet{position:fixed;inset:0;z-index:80;display:none;align-items:flex-end;background:rgba(0,0,0,.3)}
  .sheet.open{display:flex}
  .sheet .sbox{background:var(--bg);width:100%;max-height:70%;border-top:2px solid var(--ink);display:flex;flex-direction:column}
  .sheet .sh{padding:11px 13px;border-bottom:1.5px solid var(--ink);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;display:flex;align-items:center}
  .sheet .sh .sx{margin-left:auto;font-size:16px;color:var(--mut)}
  .sheet .sitems{overflow-y:auto}
  .sheet .si{padding:11px 13px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:8px}
  .sheet .si:active{background:var(--paper)}
  .sheet .si .sct{font-size:9px;color:var(--faint);margin-left:auto}
  .sheet .si.new{color:var(--teal);font-weight:700}

  .toast{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);background:var(--ink);color:var(--bg);font-size:10.5px;letter-spacing:.06em;padding:8px 14px;z-index:100;opacity:0;transition:opacity .2s;pointer-events:none;text-transform:uppercase}
  .toast.show{opacity:1}
  .hl{background:var(--amber-bg);font-weight:700}
  .loaderr{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:30px;text-align:center;color:var(--faint);font-size:12px;line-height:1.6}
</style>
</head>
<body>
<div class="top">
  <span class="logo">Field</span>
  <div class="modes" id="modes">
    <button data-mode="deck" aria-pressed="true">Deck</button>
    <button data-mode="canvas" aria-pressed="false">Canvas</button>
    <button data-mode="play" aria-pressed="false">Playlists</button>
  </div>
  <span class="spacer"></span>
  <span class="stat" id="stat"></span>
  <div class="util">
    <button id="undo" title="undo last action">Undo</button>
    <button id="export" title="export board as json">Save</button>
    <button id="import" title="import board json">Load</button>
  </div>
</div>

<div class="stage">
  <!-- DECK -->
  <div class="deck" id="deck">
    <div class="search">
      <span class="mk" aria-hidden="true"><i></i></span>
      <input id="dq" type="search" inputmode="search" placeholder="search 3,174 cards…" autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="filters" id="dfilters"></div>
    <div class="hint" id="dhint">tap a card to read · <b>+</b> drops it on the canvas</div>
    <div class="pool" id="pool"></div>
  </div>

  <!-- CANVAS -->
  <div class="canvas" id="canvas" style="display:none">
    <svg class="links" id="links"></svg>
    <div class="world" id="world"></div>
    <div class="emptyhint" id="cempty">Canvas is empty.<br><br>Go to <b>Deck</b>, find cards, tap <b>+</b> to drop them here.<br>Then drag the <b>right-edge port</b> from one card to another to link them.</div>
    <div class="linkmode-banner" id="linkbanner">drag to a card to link · tap empty space to cancel</div>
    <div class="ctools">
      <button id="zin" title="zoom in">+</button>
      <div class="zlbl" id="zlbl">100%</div>
      <button id="zout" title="zoom out">–</button>
      <button id="zfit" title="fit all" style="font-size:11px">FIT</button>
    </div>
  </div>

  <!-- PLAYLISTS -->
  <div class="play" id="play" style="display:none">
    <div class="ptop">
      <div class="ptabs" id="ptabs"></div>
      <button class="padd" id="paddlist" title="new playlist">+</button>
    </div>
    <div class="pbody" id="pbody"></div>
  </div>
</div>

<!-- READER -->
<div class="reader" id="reader" aria-hidden="true">
  <div class="rbar">
    <button class="rx" id="rx">↓</button>
    <span class="rt" id="rt"></span>
    <span class="rnav"><button id="rprev">‹</button><button id="rnext">›</button></span>
  </div>
  <div class="rbody" id="rbody"></div>
</div>

<!-- PLAYLIST PICK SHEET -->
<div class="sheet" id="sheet">
  <div class="sbox">
    <div class="sh">Add to playlist <span class="sx" id="sx">×</span></div>
    <div class="sitems" id="sitems"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ state ============ */
const LS_BOARD="field_board_v1";
let DATA=null, LINES=[], BYK={}, META=null;
let mode="deck", deckType="all", deckQuery="";
// board = persisted user state
let board=null; // {nodes:[{k,x,y,expanded,trans?,refk?}], links:[{a,b}], playlists:[{id,name,items:[k]}], view:{x,y,scale}, nextId}
let undoStack=[];
let readerList=[], readerIdx=-1, pendingAddK=null;

const TYPES={insight:{l:"Insights",sq:"insight"},tension:{l:"Tensions",sq:"tension"},sowhat:{l:"So what",sq:"sowhat"},missing:{l:"Missing",sq:"missing"}};
const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function tagName(id){ return META&&META.themes[id]? META.themes[id] : (id||"").replace(/-/g," "); }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1000); }
function gistKey(k){ return "afgist:"+k; }
function getGist(k){ try{return localStorage.getItem(gistKey(k))||"";}catch(e){return"";} }
function setGist(k,v){ try{ v?localStorage.setItem(gistKey(k),v):localStorage.removeItem(gistKey(k)); }catch(e){} }

function copy(text,label){
  const done=()=>toast(label||"copied");
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done).catch(()=>fb(text,done));
  else fb(text,done);
}
function fb(t,cb){ const a=document.createElement("textarea");a.value=t;a.style.cssText="position:fixed;opacity:0";document.body.appendChild(a);a.select();try{document.execCommand("copy")}catch(e){}document.body.removeChild(a);cb&&cb(); }

/* ============ persistence ============ */
function blankBoard(){ return {nodes:[],links:[],playlists:[],view:{x:60,y:60,scale:1},nextId:1}; }
function loadBoard(){
  try{ const r=localStorage.getItem(LS_BOARD); board = r? JSON.parse(r) : blankBoard(); }
  catch(e){ board=blankBoard(); }
  if(!board.nodes) board=blankBoard();
  if(!board.view) board.view={x:60,y:60,scale:1};
  if(!board.playlists) board.playlists=[];
}
function saveBoard(){ try{ localStorage.setItem(LS_BOARD, JSON.stringify(board)); }catch(e){ toast("storage full"); } updateStat(); }
function pushUndo(){ undoStack.push(JSON.stringify(board)); if(undoStack.length>40) undoStack.shift(); }
function doUndo(){ if(!undoStack.length){ toast("nothing to undo"); return; } board=JSON.parse(undoStack.pop()); saveBoard(); renderAll(); toast("undone"); }

function updateStat(){
  const n=board.nodes.length, l=board.links.length, p=board.playlists.length;
  document.getElementById("stat").textContent=`${n} on board · ${l} link${l!==1?"s":""} · ${p} list${p!==1?"s":""}`;
}

/* ============ links helpers (Xanadu: bidirectional) ============ */
function linkExists(a,b){ return board.links.some(L=>(L.a===a&&L.b===b)||(L.a===b&&L.b===a)); }
function addLink(a,b){ if(a===b||linkExists(a,b))return false; pushUndo(); board.links.push({a,b}); saveBoard(); return true; }
function removeLink(a,b){ pushUndo(); board.links=board.links.filter(L=>!((L.a===a&&L.b===b)||(L.a===b&&L.b===a))); saveBoard(); }
function neighborsOf(k){ // returns [{k, via:'->'|'<-'}] — but links are symmetric so all are 'linked'
  const out=[];
  board.links.forEach(L=>{ if(L.a===k) out.push(L.b); else if(L.b===k) out.push(L.a); });
  return out;
}
function onBoard(k){ return board.nodes.some(n=>n.k===k); }

/* ============ DECK ============ */
function buildFilters(){
  const f=document.getElementById("dfilters");
  let html=`<button data-t="all" class="${deckType==='all'?'on':''}">All</button>`;
  html+=Object.keys(TYPES).map(t=>`<button data-t="${t}" class="${deckType===t?'on':''}"><span class="sq ${TYPES[t].sq}"></span>${TYPES[t].l}</button>`).join("");
  f.innerHTML=html;
}
function deckFiltered(){
  const q=deckQuery.trim().toLowerCase();
  let a=LINES;
  if(deckType!=="all") a=a.filter(l=>l.t===deckType);
  if(q) a=a.filter(l=> l.lede.toLowerCase().includes(q) || l.body.toLowerCase().includes(q) || (l.tags||[]).some(t=>tagName(t).toLowerCase().includes(q)) );
  return a;
}
function hlx(t){ const q=deckQuery.trim(); if(!q)return esc(t); try{const re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig");return esc(t).replace(re,'<span class="hl">$1</span>');}catch(e){return esc(t);} }
function renderDeck(){
  buildFilters();
  const a=deckFiltered();
  const pool=document.getElementById("pool");
  document.getElementById("dhint").innerHTML=`${a.length} cards · tap to read · <b>+</b> drops on canvas`;
  if(!a.length){ pool.innerHTML=`<div style="padding:30px;text-align:center;color:var(--faint);font-size:12px">No cards match.</div>`; return; }
  const slice=a.slice(0,200);
  pool.innerHTML=slice.map(l=>{
    const ob=onBoard(l.k);
    return `<div class="dcard ${ob?'onboard':''}" data-k="${l.k}">
      <span class="dc-sq"><span class="sq ${TYPES[l.t].sq}"></span></span>
      <div class="dc-main">
        <div class="dc-lede">${hlx(l.lede)}</div>
        <div class="dc-meta">#${l.e} · ${TYPES[l.t].l} · ${l.d} · ${esc(tagName(l.prim))}</div>
      </div>
      <button class="dc-add" data-add="${l.k}" title="${ob?'on canvas':'add to canvas'}">${ob?'✓':'+'}</button>
    </div>`;
  }).join("") + (a.length>200? `<div style="padding:14px;text-align:center;color:var(--faint);font-size:10px">showing 200 of ${a.length} — refine search</div>`:"");
}

/* ============ CANVAS ============ */
const world=document.getElementById("world"), linksSvg=document.getElementById("links"), canvasEl=document.getElementById("canvas");
function applyView(){
  const v=board.view;
  world.style.transform=`translate(${v.x}px,${v.y}px) scale(${v.scale})`;
  linksSvg.style.transform=world.style.transform;
  document.getElementById("zlbl").textContent=Math.round(v.scale*100)+"%";
}
function nodeData(k){ return board.nodes.find(n=>n.k===k); }
function renderCanvas(){
  document.getElementById("cempty").style.display = board.nodes.length? "none":"block";
  // nodes
  world.innerHTML = board.nodes.map(n=>{
    const l=BYK[n.k]; if(!l) return "";
    const isTrans=!!n.trans;
    const exp = n.expanded? `<div class="nexp">${esc(l.body)}</div>`:"";
    const nb = neighborsOf(n.k);
    const transref = isTrans? `<div class="transref">⊂ transcluded from #${l.e}</div>`:"";
    const gist=getGist(n.k);
    return `<div class="node ${n.expanded?'expanded':''} ${isTrans?'trans':''}" data-node="${n.k}" style="left:${n.x}px;top:${n.y}px">
      <div class="nhead" data-drag="${n.k}">
        <span class="sq ${TYPES[l.t].sq}"></span>
        <span class="ntype">${TYPES[l.t].l}</span>
        <span class="nid">#${l.e}·${nb.length?nb.length+'⇄':''}</span>
        <span class="nx" data-remove="${n.k}">×</span>
      </div>
      <div class="nbody">
        <div class="nlede">${esc(l.lede)}</div>
        ${exp}
        ${gist?`<div class="nexp" style="display:block;color:var(--amber);border-left:2px solid var(--amber);padding-left:6px">${esc(gist)}</div>`:""}
        <div class="nmeta"><span>${l.d}</span><span>${esc(tagName(l.prim))}</span>${nb.length?`<span class="bk" data-bk="${n.k}">${nb.length} linked</span>`:""}</div>
      </div>
      <div class="nfoot">
        <button data-exp="${n.k}">${n.expanded?'Less':'More'}</button>
        <button data-open="${n.k}">Read</button>
        <button data-copy="${n.k}">Copy</button>
      </div>
      ${transref}
      <div class="port" data-port="${n.k}" title="drag to another card to link"></div>
    </div>`;
  }).join("");
  renderLinks();
  applyView();
}
function nodeCenterRight(k){ const n=nodeData(k); const el=world.querySelector(`[data-node="${k}"]`); const w=el?el.offsetWidth:230, h=el?el.offsetHeight:90; return {x:n.x+w, y:n.y+h/2, lx:n.x, ly:n.y+h/2, w, h, cx:n.x+w/2, cy:n.y+h/2}; }
function renderLinks(){
  let paths="";
  board.links.forEach((L,i)=>{
    const A=world.querySelector(`[data-node="${L.a}"]`), B=world.querySelector(`[data-node="${L.b}"]`);
    if(!A||!B) return;
    const na=nodeData(L.a), nb=nodeData(L.b);
    const aw=A.offsetWidth, ah=A.offsetHeight, bw=B.offsetWidth, bh=B.offsetHeight;
    // connect nearest sides horizontally
    let ax,ay,bx,by;
    ay=na.y+ah/2; by=nb.y+bh/2;
    if(na.x < nb.x){ ax=na.x+aw; bx=nb.x; } else { ax=na.x; bx=nb.x+bw; }
    const dx=Math.abs(bx-ax)*0.5+20;
    const c1x = na.x<nb.x? ax+dx : ax-dx;
    const c2x = na.x<nb.x? bx-dx : bx+dx;
    const d=`M${ax},${ay} C${c1x},${ay} ${c2x},${by} ${bx},${by}`;
    const selA = window._selNode===L.a||window._selNode===L.b;
    paths+=`<path class="lkhit" data-lka="${L.a}" data-lkb="${L.b}" d="${d}"></path>`;
    paths+=`<path class="${window._selLink===i?'sel':''}" d="${d}"></path>`;
  });
  linksSvg.innerHTML=paths;
}

function addNodeToCanvas(k, opts){
  if(!opts && onBoard(k)){ toast("already on canvas"); return; }
  pushUndo();
  const v=board.view;
  // place in current viewport center, with slight cascade
  const cx=(canvasEl.clientWidth/2 - v.x)/v.scale, cy=(canvasEl.clientHeight/2 - v.y)/v.scale;
  const off=board.nodes.length%6;
  const node={k, x: Math.round(cx-115+off*16), y: Math.round(cy-45+off*16), expanded:false};
  if(opts&&opts.trans){ node.trans=true; }
  if(opts&&typeof opts.x==="number"){ node.x=opts.x; node.y=opts.y; }
  board.nodes.push(node);
  saveBoard();
  if(mode==="canvas") renderCanvas(); 
}
function removeNode(k){
  pushUndo();
  board.nodes=board.nodes.filter(n=>n.k!==k);
  board.links=board.links.filter(L=>L.a!==k&&L.b!==k);
  saveBoard(); renderCanvas();
}

/* ---- canvas pan/zoom (pointer) ---- */
let panning=false, panStart=null, dragNode=null, dragStart=null, linking=null, linkGhost=null, movedFar=false;
function clientToWorld(cx,cy){ const v=board.view; return {x:(cx-v.x)/v.scale, y:(cy-v.y)/v.scale}; }

canvasEl.addEventListener("pointerdown",e=>{
  if(mode!=="canvas") return;
  const portEl=e.target.closest("[data-port]");
  const dragEl=e.target.closest("[data-drag]");
  const lkHit=e.target.closest("[data-lka]");
  if(portEl){
    // start linking
    const k=+portEl.dataset.port;
    linking={from:k};
    world.querySelector(`[data-node="${k}"]`)?.classList.add("linking");
    document.getElementById("linkbanner").classList.add("show");
    try{ canvasEl.setPointerCapture(e.pointerId); }catch(_){}
    e.preventDefault(); e.stopPropagation(); return;
  }
  if(dragEl){
    const k=+dragEl.dataset.drag;
    window._selNode=k; window._selLink=null;
    dragNode=k; const n=nodeData(k);
    dragStart={mx:e.clientX,my:e.clientY,nx:n.x,ny:n.y}; movedFar=false;
    try{ canvasEl.setPointerCapture(e.pointerId); }catch(_){}
    document.querySelectorAll(".node.sel").forEach(x=>x.classList.remove("sel"));
    world.querySelector(`[data-node="${k}"]`)?.classList.add("sel");
    e.preventDefault(); return;
  }
  if(lkHit){
    const a=+lkHit.dataset.lka, b=+lkHit.dataset.lkb;
    const idx=board.links.findIndex(L=>(L.a===a&&L.b===b)||(L.a===b&&L.b===a));
    window._selLink=idx; window._selNode=null;
    renderLinks();
    if(confirm("Delete this connection?")){ removeLink(a,b); window._selLink=null; }
    e.preventDefault(); return;
  }
  // pan
  panning=true; panStart={mx:e.clientX,my:e.clientY,vx:board.view.x,vy:board.view.y};
  window._selNode=null; window._selLink=null;
  document.querySelectorAll(".node.sel").forEach(x=>x.classList.remove("sel"));
  canvasEl.setPointerCapture(e.pointerId);
});
window.addEventListener("pointermove",e=>{
  if(mode!=="canvas") return;
  if(linking){
    // draw ghost line
    const from=nodeCenterRight(linking.from);
    const p=clientToWorld(e.clientX,e.clientY);
    let g=document.getElementById("ghostlink");
    if(!g){ g=document.createElementNS("http://www.w3.org/2000/svg","path"); g.id="ghostlink"; g.setAttribute("stroke","var(--amber)"); g.setAttribute("stroke-width","1.6"); g.setAttribute("stroke-dasharray","4 3"); g.setAttribute("fill","none"); linksSvg.appendChild(g); }
    g.setAttribute("d",`M${from.x},${from.y} L${p.x},${p.y}`);
    return;
  }
  if(dragNode!=null){
    const dx=(e.clientX-dragStart.mx)/board.view.scale, dy=(e.clientY-dragStart.my)/board.view.scale;
    if(Math.abs(e.clientX-dragStart.mx)+Math.abs(e.clientY-dragStart.my)>4) movedFar=true;
    const n=nodeData(dragNode); n.x=Math.round(dragStart.nx+dx); n.y=Math.round(dragStart.ny+dy);
    const el=world.querySelector(`[data-node="${dragNode}"]`); if(el){ el.style.left=n.x+"px"; el.style.top=n.y+"px"; }
    renderLinks();
    return;
  }
  if(panning){
    board.view.x=panStart.vx+(e.clientX-panStart.mx);
    board.view.y=panStart.vy+(e.clientY-panStart.my);
    applyView();
  }
});
window.addEventListener("pointerup",e=>{
  if(linking){
    // during pointer capture e.target is the capturing element, so hit-test by coordinates
    const under=document.elementFromPoint(e.clientX,e.clientY);
    const tgt=under?under.closest("[data-node]"):null;
    const g=document.getElementById("ghostlink"); if(g) g.remove();
    world.querySelector(`[data-node="${linking.from}"]`)?.classList.remove("linking");
    document.getElementById("linkbanner").classList.remove("show");
    if(tgt){ const to=+tgt.dataset.node; if(addLink(linking.from,to)){ toast("linked"); renderCanvas(); } else if(linking.from!==to) toast("already linked"); }
    linking=null; return;
  }
  if(dragNode!=null){ if(movedFar){ saveBoard(); } dragNode=null; renderLinks(); return; }
  if(panning){ panning=false; if(board) saveBoard(); }
});

/* zoom */
function setScale(ns, cx, cy){
  const v=board.view; ns=Math.max(0.3,Math.min(2.2,ns));
  cx=cx??canvasEl.clientWidth/2; cy=cy??canvasEl.clientHeight/2;
  const wx=(cx-v.x)/v.scale, wy=(cy-v.y)/v.scale;
  v.scale=ns; v.x=cx-wx*ns; v.y=cy-wy*ns; applyView(); saveBoard();
}
document.getElementById("zin").onclick=()=>setScale(board.view.scale*1.2);
document.getElementById("zout").onclick=()=>setScale(board.view.scale/1.2);
document.getElementById("zfit").onclick=fitAll;
canvasEl.addEventListener("wheel",e=>{ if(mode!=="canvas")return; e.preventDefault(); setScale(board.view.scale*(e.deltaY<0?1.1:0.9), e.clientX, e.clientY-document.querySelector(".top").offsetHeight); },{passive:false});
// pinch
let pinch=null;
canvasEl.addEventListener("touchstart",e=>{ if(e.touches.length===2){ pinch={d:dist(e.touches),s:board.view.scale}; } },{passive:true});
canvasEl.addEventListener("touchmove",e=>{ if(pinch&&e.touches.length===2){ const nd=dist(e.touches); const mx=(e.touches[0].clientX+e.touches[1].clientX)/2, my=(e.touches[0].clientY+e.touches[1].clientY)/2-document.querySelector(".top").offsetHeight; setScale(pinch.s*nd/pinch.d, mx, my);} },{passive:true});
canvasEl.addEventListener("touchend",e=>{ if(e.touches.length<2) pinch=null; },{passive:true});
function dist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
function fitAll(){
  if(!board.nodes.length){ board.view={x:60,y:60,scale:1}; applyView(); saveBoard(); return; }
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  board.nodes.forEach(n=>{ const el=world.querySelector(`[data-node="${n.k}"]`); const w=el?el.offsetWidth:230,h=el?el.offsetHeight:90;
    minx=Math.min(minx,n.x);miny=Math.min(miny,n.y);maxx=Math.max(maxx,n.x+w);maxy=Math.max(maxy,n.y+h); });
  const pad=40, cw=canvasEl.clientWidth, ch=canvasEl.clientHeight;
  const sx=(cw-pad*2)/(maxx-minx||1), sy=(ch-pad*2)/(maxy-miny||1);
  let s=Math.min(sx,sy,1.4); s=Math.max(0.3,s);
  board.view.scale=s; board.view.x=pad-minx*s+(cw-pad*2-(maxx-minx)*s)/2; board.view.y=pad-miny*s+(ch-pad*2-(maxy-miny)*s)/2;
  applyView(); saveBoard();
}

/* canvas tap on node body (not drag) -> open reader; expand/copy/etc via buttons */
world.addEventListener("click",e=>{
  let b=e.target.closest("[data-remove]"); if(b){ removeNode(+b.dataset.remove); return; }
  b=e.target.closest("[data-exp]"); if(b){ const n=nodeData(+b.dataset.exp); n.expanded=!n.expanded; saveBoard(); renderCanvas(); return; }
  b=e.target.closest("[data-open]"); if(b){ openReader(+b.dataset.open, 'canvas'); return; }
  b=e.target.closest("[data-copy]"); if(b){ const l=BYK[+b.dataset.copy]; const g=getGist(l.k); copy(cardText(l,g),"card copied"); return; }
  b=e.target.closest("[data-bk]"); if(b){ openReader(+b.dataset.bk,'canvas'); return; }
});

function cardText(l, gist){
  let s=`[${TYPES[l.t].l} · #${l.e} · ${l.d}]\n${l.lede}\n\n${l.body}`;
  if(gist) s+=`\n\n→ ${gist}`;
  return s;
}

/* ============ PLAYLISTS ============ */
let activeList=null;
function ensureActiveList(){ if(!activeList && board.playlists.length) activeList=board.playlists[0].id; }
function newPlaylist(name){
  pushUndo();
  const id="pl"+(board.nextId++);
  board.playlists.push({id,name:name||("Playlist "+board.playlists.length+1),items:[]});
  activeList=id; saveBoard(); return id;
}
function renderPlay(){
  ensureActiveList();
  const tabs=document.getElementById("ptabs");
  if(!board.playlists.length){
    tabs.innerHTML=`<span style="font-size:10px;color:var(--faint);padding:6px 4px;letter-spacing:.04em">No playlists yet — tap + to make one</span>`;
    document.getElementById("pbody").innerHTML=`<div class="pempty">Playlists are ordered sequences of cards — an argument, a reading order, a thread.<br><br>Make one with <b>+</b>, then add cards from the <b>Deck</b> or a card's <b>Read</b> view.</div>`;
    return;
  }
  tabs.innerHTML=board.playlists.map(p=>`<button data-list="${p.id}" class="${p.id===activeList?'on':''}">${esc(p.name)} <span style="opacity:.6">${p.items.length}</span></button>`).join("");
  const pl=board.playlists.find(p=>p.id===activeList)||board.playlists[0];
  const body=document.getElementById("pbody");
  let html=`<div class="pmeta"><span class="pname">${esc(pl.name)}</span><span>${pl.items.length} cards</span><span class="pren" data-ren="${pl.id}">rename</span><span class="pdel" data-pdel="${pl.id}">delete</span></div>`;
  if(!pl.items.length){ html+=`<div class="pempty">Empty. Add cards from the Deck (long-press +) or a card's Read view.</div>`; }
  else html+=pl.items.map((k,i)=>{
    const l=BYK[k]; if(!l)return"";
    const g=getGist(k);
    return `<div class="pcard" data-pk="${k}">
      <span class="pnum">${i+1}</span>
      <div class="pc-ord"><button data-up="${i}">▲</button><button data-down="${i}">▼</button></div>
      <div class="pc-main" data-popen="${k}">
        <div class="pc-lede"><span class="sq ${TYPES[l.t].sq}" style="margin-right:5px;vertical-align:1px"></span>${esc(l.lede)}</div>
        ${g?`<div class="pc-exp" style="color:var(--amber)">${esc(g)}</div>`:`<div class="pc-exp">${esc(l.body)}</div>`}
        <div class="pc-meta">#${l.e} · ${l.d} · ${esc(tagName(l.prim))}</div>
      </div>
      <button class="dc-add" data-prem="${k}" style="align-self:flex-start" title="remove from playlist">×</button>
    </div>`;
  }).join("");
  html+=`<div style="padding:12px 10px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--rule)">
    <button data-copylist="${pl.id}" style="border:1.5px solid var(--ink);padding:7px 11px;font-size:10px;letter-spacing:.06em;text-transform:uppercase">Copy whole playlist</button>
    <button data-tocanvas="${pl.id}" style="border:1.5px solid var(--ink);padding:7px 11px;font-size:10px;letter-spacing:.06em;text-transform:uppercase">Send all to canvas</button>
  </div>`;
  body.innerHTML=html;
}
function addToPlaylist(listId,k){
  const pl=board.playlists.find(p=>p.id===listId); if(!pl)return;
  if(pl.items.includes(k)){ toast("already in list"); return; }
  pushUndo(); pl.items.push(k); saveBoard(); toast("added to "+pl.name);
}

document.getElementById("ptabs").addEventListener("click",e=>{ const b=e.target.closest("[data-list]"); if(b){ activeList=b.dataset.list; renderPlay(); } });
document.getElementById("paddlist").onclick=()=>{ const name=prompt("Playlist name:",""); if(name!==null){ newPlaylist(name.trim()); renderPlay(); } };
document.getElementById("pbody").addEventListener("click",e=>{
  let b=e.target.closest("[data-up]"); if(b){ const i=+b.dataset.up; const pl=board.playlists.find(p=>p.id===activeList); if(i>0){ pushUndo(); [pl.items[i-1],pl.items[i]]=[pl.items[i],pl.items[i-1]]; saveBoard(); renderPlay(); } return; }
  b=e.target.closest("[data-down]"); if(b){ const i=+b.dataset.down; const pl=board.playlists.find(p=>p.id===activeList); if(i<pl.items.length-1){ pushUndo(); [pl.items[i+1],pl.items[i]]=[pl.items[i],pl.items[i+1]]; saveBoard(); renderPlay(); } return; }
  b=e.target.closest("[data-prem]"); if(b){ const k=+b.dataset.prem; const pl=board.playlists.find(p=>p.id===activeList); pushUndo(); pl.items=pl.items.filter(x=>x!==k); saveBoard(); renderPlay(); return; }
  b=e.target.closest("[data-popen]"); if(b){ openReader(+b.dataset.popen,'play'); return; }
  b=e.target.closest("[data-ren]"); if(b){ const pl=board.playlists.find(p=>p.id===b.dataset.ren); const nn=prompt("Rename playlist:",pl.name); if(nn!==null){ pushUndo(); pl.name=nn.trim()||pl.name; saveBoard(); renderPlay(); } return; }
  b=e.target.closest("[data-pdel]"); if(b){ if(confirm("Delete this playlist? (cards stay in the deck)")){ pushUndo(); board.playlists=board.playlists.filter(p=>p.id!==b.dataset.pdel); activeList=board.playlists[0]?board.playlists[0].id:null; saveBoard(); renderPlay(); } return; }
  b=e.target.closest("[data-copylist]"); if(b){ const pl=board.playlists.find(p=>p.id===b.dataset.copylist); const txt=pl.items.map((k,i)=>{const l=BYK[k];const g=getGist(k); return `${i+1}. ${l.lede}${g?'\n   → '+g:''}`;}).join("\n\n"); copy(`# ${pl.name}\n\n${txt}`,"playlist copied"); return; }
  b=e.target.closest("[data-tocanvas]"); if(b){ const pl=board.playlists.find(p=>p.id===b.dataset.tocanvas); pushUndo(); let added=0; pl.items.forEach((k,i)=>{ if(!onBoard(k)){ board.nodes.push({k,x:80+(i%5)*250,y:80+Math.floor(i/5)*150,expanded:false}); added++; } }); saveBoard(); toast(added+" sent to canvas"); switchMode("canvas"); return; }
});

/* ============ READER ============ */
function openReader(k, ctx){
  // reader list = current context list for prev/next
  if(ctx==='deck') readerList=deckFiltered().map(x=>x.k);
  else if(ctx==='canvas') readerList=board.nodes.map(n=>n.k);
  else if(ctx==='play'){ const pl=board.playlists.find(p=>p.id===activeList); readerList=pl?pl.items.slice():[k]; }
  else readerList=[k];
  readerIdx=readerList.indexOf(k); if(readerIdx<0){ readerList=[k]; readerIdx=0; }
  paintReader(k);
  const r=document.getElementById("reader"); r.classList.add("open"); r.setAttribute("aria-hidden","false");
}
function closeReader(){ const r=document.getElementById("reader"); r.classList.remove("open"); r.setAttribute("aria-hidden","true"); }
function rstep(d){ const ni=readerIdx+d; if(ni<0||ni>=readerList.length)return; readerIdx=ni; paintReader(readerList[ni]); document.getElementById("rbody").scrollTop=0; }
function paintReader(k){
  const l=BYK[k]; if(!l)return;
  document.getElementById("rt").textContent=`${TYPES[l.t].l} · #${l.e} · ${l.d} · card ${l.k}`;
  const gist=getGist(k);
  const nb=neighborsOf(k);
  const ob=onBoard(k);
  let linksHtml="";
  if(nb.length){
    linksHtml=`<div class="rsec rlinks"><div class="rh">Connected (${nb.length}) — bidirectional</div>`+
      nb.map(nk=>{ const ll=BYK[nk]; return `<div class="lkitem" data-rjump="${nk}"><span class="dir">⇄ #${ll.e}</span><span class="lktext">${esc(ll.lede)}</span></div>`; }).join("")+`</div>`;
  }
  document.getElementById("rbody").innerHTML=`
    <div class="rl"><span class="sq ${TYPES[l.t].sq}" style="vertical-align:3px;margin-right:6px"></span>${esc(l.lede)}</div>
    <div class="rmeta"><span class="pill">${l.d}</span><span class="pill">${esc(tagName(l.prim))}</span>${(l.tags||[]).filter(t=>t!==l.prim).map(t=>`<span class="pill">${esc(tagName(t))}</span>`).join("")}</div>
    <div class="rsec"><div class="rh">Full item</div><div class="rexp">${esc(l.body)}</div></div>
    <div class="rsec rgist"><div class="rh">Your compression</div><textarea id="rgistta" placeholder="one tight line (12–18 words)">${esc(gist)}</textarea><div style="font-size:9px;color:var(--faint);margin-top:4px" id="rgwc">${gist?(gist.trim().match(/\S+/g)||[]).length+" words":"saved to this device"}</div></div>
    ${linksHtml}
    <div class="ract">
      <button data-rcopy="${k}">Copy card</button>
      <button data-rcanvas="${k}">${ob?'On canvas ✓':'Add to canvas'}</button>
      <button data-rplay="${k}">Add to playlist</button>
    </div>`;
  document.getElementById("rprev").style.opacity=readerIdx>0?1:.3;
  document.getElementById("rnext").style.opacity=readerIdx<readerList.length-1?1:.3;
  const ta=document.getElementById("rgistta"); let t;
  ta.addEventListener("input",()=>{ clearTimeout(t); t=setTimeout(()=>{ const v=ta.value.trim(); setGist(k,v); document.getElementById("rgwc").textContent=v?(v.match(/\S+/g)||[]).length+" words":"saved to this device"; if(mode==="canvas")renderCanvas(); },300); });
}
document.getElementById("rbody").addEventListener("click",e=>{
  let b=e.target.closest("[data-rjump]"); if(b){ openReader(+b.dataset.rjump, onBoard(+b.dataset.rjump)?'canvas':'single'); return; }
  b=e.target.closest("[data-rcopy]"); if(b){ const l=BYK[+b.dataset.rcopy]; copy(cardText(l,getGist(l.k)),"card copied"); return; }
  b=e.target.closest("[data-rcanvas]"); if(b){ const k=+b.dataset.rcanvas; if(!onBoard(k)){ addNodeToCanvas(k); toast("added to canvas"); paintReader(k);} return; }
  b=e.target.closest("[data-rplay]"); if(b){ openSheet(+b.dataset.rplay); return; }
});
document.getElementById("rx").onclick=closeReader;
document.getElementById("rprev").onclick=()=>rstep(-1);
document.getElementById("rnext").onclick=()=>rstep(1);

/* ============ playlist pick sheet ============ */
function openSheet(k){
  pendingAddK=k;
  const items=document.getElementById("sitems");
  let html=board.playlists.map(p=>`<div class="si" data-sl="${p.id}">${esc(p.name)}<span class="sct">${p.items.length}${p.items.includes(k)?" · in":""}</span></div>`).join("");
  html+=`<div class="si new" data-snew="1">+ New playlist…</div>`;
  items.innerHTML=html;
  document.getElementById("sheet").classList.add("open");
}
function closeSheet(){ document.getElementById("sheet").classList.remove("open"); pendingAddK=null; }
document.getElementById("sx").onclick=closeSheet;
document.getElementById("sheet").addEventListener("click",e=>{
  if(e.target.id==="sheet"){ closeSheet(); return; }
  let b=e.target.closest("[data-sl]"); if(b){ addToPlaylist(b.dataset.sl,pendingAddK); closeSheet(); return; }
  b=e.target.closest("[data-snew]"); if(b){ const name=prompt("Playlist name:",""); if(name!==null){ const id=newPlaylist(name.trim()); addToPlaylist(id,pendingAddK); } closeSheet(); return; }
});

/* ============ deck events ============ */
document.getElementById("pool").addEventListener("click",e=>{
  let b=e.target.closest("[data-add]"); if(b){ e.stopPropagation(); const k=+b.dataset.add; if(onBoard(k)){ toast("on canvas — switch to Canvas"); } else { addNodeToCanvas(k); toast("added to canvas"); } renderDeck(); return; }
  const card=e.target.closest("[data-k]"); if(card){ openReader(+card.dataset.k,'deck'); }
});
// long-press on + to add to playlist instead
let lpTimer=null;
document.getElementById("pool").addEventListener("pointerdown",e=>{ const b=e.target.closest("[data-add]"); if(!b)return; lpTimer=setTimeout(()=>{ lpTimer=null; openSheet(+b.dataset.add); },480); });
document.getElementById("pool").addEventListener("pointerup",()=>{ if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } });
document.getElementById("pool").addEventListener("pointerleave",()=>{ if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } });

const dq=document.getElementById("dq"); let dqt;
dq.addEventListener("input",()=>{ deckQuery=dq.value; clearTimeout(dqt); dqt=setTimeout(renderDeck,140); });
document.getElementById("dfilters").addEventListener("click",e=>{ const b=e.target.closest("[data-t]"); if(b){ deckType=b.dataset.t; renderDeck(); } });

/* ============ modes ============ */
function switchMode(m){ mode=m; document.querySelectorAll("#modes button").forEach(b=>b.setAttribute("aria-pressed",b.dataset.mode===m));
  document.getElementById("deck").style.display=m==="deck"?"flex":"none";
  document.getElementById("canvas").style.display=m==="canvas"?"block":"none";
  document.getElementById("play").style.display=m==="play"?"flex":"none";
  if(m==="canvas") renderCanvas(); if(m==="play") renderPlay(); if(m==="deck") renderDeck();
}
document.getElementById("modes").addEventListener("click",e=>{ const b=e.target.closest("[data-mode]"); if(b) switchMode(b.dataset.mode); });

/* ============ undo / export / import ============ */
document.getElementById("undo").onclick=doUndo;
document.getElementById("export").onclick=()=>{
  const payload={board, gists:{}};
  board.nodes.forEach(n=>{ const g=getGist(n.k); if(g) payload.gists[n.k]=g; });
  board.playlists.forEach(p=>p.items.forEach(k=>{ const g=getGist(k); if(g) payload.gists[k]=g; }));
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="field-board.json"; a.click();
  toast("board exported");
};
document.getElementById("import").onclick=()=>{
  const inp=document.createElement("input"); inp.type="file"; inp.accept="application/json,.json";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f)return; const r=new FileReader();
    r.onload=()=>{ try{ const p=JSON.parse(r.result); if(p.board){ pushUndo(); board=p.board; if(p.gists) Object.entries(p.gists).forEach(([k,v])=>setGist(+k,v)); saveBoard(); activeList=board.playlists[0]?board.playlists[0].id:null; renderAll(); toast("board loaded"); } else toast("not a board file"); }catch(e){ toast("bad file"); } };
    r.readAsText(f); };
  inp.click();
};

function renderAll(){ updateStat(); if(mode==="deck")renderDeck(); else if(mode==="canvas")renderCanvas(); else renderPlay(); }

/* keyboard */
window.addEventListener("keydown",e=>{
  if(document.getElementById("reader").classList.contains("open")){
    if(e.key==="Escape")closeReader(); else if(e.key==="ArrowLeft")rstep(-1); else if(e.key==="ArrowRight")rstep(1);
    return;
  }
  if((e.metaKey||e.ctrlKey)&&e.key==="z"){ e.preventDefault(); doUndo(); }
});

/* ============ load ============ */
fetch("lines.json").then(r=>{ if(!r.ok) throw new Error("lines.json "+r.status); return r.json(); })
.then(d=>{
  DATA=d; LINES=d.lines; META=d.meta; LINES.forEach(l=>BYK[l.k]=l);
  loadBoard();
  switchMode("deck");
  updateStat();
}).catch(err=>{
  document.querySelector(".stage").innerHTML=`<div class="loaderr">Couldn't load <b>lines.json</b> (${esc(err.message)}).<br>Serve this file alongside <code>lines.json</code> over http — open them from the same folder, not as a bare file.</div>`;
});
</script>
</body>
</html>
