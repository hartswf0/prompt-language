function genIFID(){ return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==="x"?r:(r&0x3|0x8)).toString(16);}).toUpperCase(); }
function uniqueTitles(){
  const ids=Object.keys(ROOMS), count={}, seen={}, T={};
  ids.forEach(i=>count[ROOMS[i].name]=(count[ROOMS[i].name]||0)+1);
  ids.forEach(i=>{ const nm=ROOMS[i].name; if(count[nm]>1){ seen[nm]=(seen[nm]||0)+1; T[i]=nm+" "+seen[nm]; } else T[i]=nm; });
  return T;
}
function roomNotables(id){
  const keep=["mailbox","window","rug","trophy_case","troll","cyclops","thief","altar","railing","skeleton"];
  const r=[]; for(const it in ITEMS){ const I=ITEMS[it]; if(I.start===id && (I.takeable||I.treasure||keep.includes(it))) r.push(I); } return r;
}
function buildTwee(){
  const T=uniqueTitles(); const L=[];
  L.push(":: StoryTitle"); L.push("CINEOSIS ZORK"); L.push("");
  L.push(":: StoryData");
  L.push(JSON.stringify({ ifid:genIFID(), format:"Harlowe", "format-version":"3.3.9", start:T.WEST_OF_HOUSE, "tag-colors":{ treasure:"green", dark:"purple" } }, null, 2));
  L.push("");
  for(const id in ROOMS){
    const r=ROOMS[id], items=roomNotables(id), tags=[];
    if(r.dark) tags.push("dark");
    if(items.some(i=>i.treasure)) tags.push("treasure");
    L.push(":: "+T[id]+(tags.length?" ["+tags.join(" ")+"]":""));
    L.push(r.desc);
    if(items.length){ L.push(""); L.push("Here: "+items.map(i=>i.name+(i.treasure?" (treasure)":"")).join(", ")+"."); }
    L.push("");
    const ex=r.exits||{};
    for(const d in ex){ const t=ex[d];
      if(t==="__BOARDED__"){ L.push("The way "+DIRNAME[d]+" is boarded shut."); continue; }
      if(!ROOMS[t]) continue;
      L.push("[["+DIRNAME[d]+"->"+T[t]+"]]");
    }
    if(id==="BEHIND_HOUSE") L.push("[[in (open the window first)->"+T.KITCHEN+"]]");
    if(id==="LIVING_ROOM")  L.push("[[down (move rug, open trap door)->"+T.CELLAR+"]]");
    if(id==="CYCLOPS_ROOM"){ L.push("[[up (say the magic word)->"+T.TREASURE_ROOM+"]]"); L.push("[[east (after the cyclops flees)->"+T.LIVING_ROOM+"]]"); }
    if(id==="DOME_ROOM")    L.push("[[down (tie the rope to the railing)->"+T.TORCH_ROOM+"]]");
    if(id==="TEMPLE")       L.push("[[pray (teleports you out)->"+T.FOREST_1+"]]");
    L.push("");
  }
  return L.join("\n");
}
function buildMapHTML(){

  const addEdge=(f,t,d,g)=>{ if(!ROOMS[f]||!ROOMS[t]) return; edges.push({from:f,to:t,dir:d,gated:!!g}); adj[f].push(t); adj[t].push(f); };
  for(const id of ids){ const ex=ROOMS[id].exits||{}; for(const d in ex){ const t=ex[d]; if(ROOMS[t]) addEdge(id,t,d,false); } }
  // puzzle-gated passages (drawn dashed) so the interior is reachable on the graph
  const has=(f,t)=>edges.some(e=>e.from===f&&e.to===t);
  for(const [f,t,d] of [["BEHIND_HOUSE","KITCHEN","in"],["LIVING_ROOM","CELLAR","down"],["CYCLOPS_ROOM","TREASURE_ROOM","up"],["CYCLOPS_ROOM","LIVING_ROOM","east"],["DOME_ROOM","TORCH_ROOM","down"],["TEMPLE","FOREST_1","pray"]])
    if(!has(f,t)) addEdge(f,t,d,true);

  const start="WEST_OF_HOUSE", order=[], inq={}; inq[start]=1; const q=[start];
  while(q.length){ const c=q.shift(); order.push(c); for(const nb of adj[c]) if(!inq[nb]){ inq[nb]=1; q.push(nb); } }
  ids.forEach(i=>{ if(!inq[i]) order.push(i); });
  // compact grid in traversal order (connected rooms land near each other)
  const NW=158, NH=46, COLW=212, ROWH=88, MX=36, MY=46, pos={};

  let eSvg="", lSvg="";

    const lx=x1+(x2-x1)*0.3, ly=y1+(y2-y1)*0.3;

  }
  let nSvg="";
  for(const id of ids){ const p=pos[id], tr=isTre(id), dk=ROOMS[id].dark;
    nSvg+='<g transform="translate('+p.x+','+p.y+')">'+

      '<text x="6" y="33" class="nsub">'+(dk?'dark':'')+(tr?(dk?' / treasure':'treasure'):'')+'</text>'+
      '</g>';
  }
  let list="";

    const exits=Object.keys(ex).filter(d=>ex[d]!=="__BOARDED__"&&ROOMS[ex[d]]).map(d=>DIRNAME[d]+" -> "+T[ex[d]]);
    list+='<div class="rl"><h3>'+T[id]+(r.dark?' <span class="tag">dark</span>':'')+(isTre(id)?' <span class="tag">treasure</span>':'')+'</h3><p>'+r.desc+'</p>'+
      (exits.length?'<p class="ex">'+exits.join(" &nbsp;&middot;&nbsp; ")+'</p>':'')+'</div>';
  }
  return '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CINEOSIS ZORK - Branch Map</title>'+
'<style>:root{--ink:#000;--paper:#fff;--mono:ui-monospace,Menlo,Consolas,monospace;--grot:"Arial Narrow","Helvetica Neue",Arial,sans-serif}'+
'*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--mono);font-size:13px;-webkit-font-smoothing:none}'+
'header{border-bottom:2px solid var(--ink);padding:8px 14px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}'+
'h1{font-family:var(--grot);font-weight:800;font-stretch:condensed;text-transform:uppercase;letter-spacing:-.01em;font-size:22px;margin:0}'+
'.sub{font-family:var(--grot);font-weight:700;font-stretch:condensed;text-transform:uppercase;letter-spacing:.13em;font-size:10px}'+

/* =====================================================================
   PART D — UI CONTROLLER  (DOM; guarded so headless tests skip it)
   Realises the POML interaction law: bidirectional binding between the
   BEFLIX source (control surface) and the cell viewport, plus a
   foot-anchored op stack. Transcript object names are also a control
   surface (click to examine / move).
   ===================================================================== */
if (typeof document !== "undefined") (function(){
  const $ = id => document.getElementById(id);
  const transcript=$("transcript"), cmdInput=$("cmd"), tray=$("tray"), moreBtn=$("moreBtn"),
        cellCanvas=$("cellCanvas"), bindCanvas=$("bindCanvas"), crt=$("crt"),
        crtLabel=$("crtLabel"), cellRoom=$("cellRoom"), cellStat=$("cellStat"),
        scoreReadout=$("scoreReadout"), srcList=$("srcList"), srcEdit=$("srcEdit"),
        srcText=$("srcText"), editToggle=$("editToggle"), stackWrap=$("stackWrap"),
        stackCount=$("stackCount"), tPlay=$("tPlay"), tBack=$("tBack"), tFwd=$("tFwd"),
        tScrub=$("tScrub"), tCur=$("tCur"), tTot=$("tTot"),
        bindInfo=$("bindInfo"), btnUndo=$("btnUndo"), btnSave=$("btnSave"), btnLoad=$("btnLoad"), wsw=$("wsw");

  const SCALE=6, G=64;
  let state=newGame();
  let opMeta={};            // line -> {depth, kind, order} for bind readout
  let undoStack=[], savedSlot=null;
  const snapshot = () => JSON.parse(JSON.stringify(state));
  const clone = o => JSON.parse(JSON.stringify(o));
  const executor=new CellExecutor({sprites:SPRITES});
  let player=null, program=null, currentSource="", boundLine=null;
  const journey=[]; let filming=false;
  let history=[], histIdx=0, editing=false;

  /* ---------- transcript + control-surface linkify ---------- */
  const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  function linkify(text){
    const nouns=scopeNouns(state), matches=[];
    for(const {word,id} of nouns){ const re=new RegExp("\\b"+word.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","ig"); let m;
      while((m=re.exec(text))) matches.push({start:m.index,end:m.index+m[0].length,id,text:m[0]}); }
    matches.sort((a,b)=> a.start-b.start || (b.end-b.start)-(a.end-a.start));
    const picked=[]; let lastEnd=-1;
    for(const mt of matches) if(mt.start>=lastEnd){ picked.push(mt); lastEnd=mt.end; }
    let out="", pos=0;
    for(const mt of picked){ out+=esc(text.slice(pos,mt.start)); out+='<button class="ref" data-ex="'+mt.id+'">'+esc(mt.text)+"</button>"; pos=mt.end; }
    out+=esc(text.slice(pos)); return out;
  }
  function printLine(o){
    const d=document.createElement("div");
    if(o.room){ d.className="t-room"; d.textContent=o.room.toUpperCase(); }
    else if(o.exits){ d.className="exits"; d.innerHTML="<b>Exits:</b> "+o.exits.map(x=>'<button class="ref" data-go="'+x+'">'+x+"</button>").join(" · "); }
    else if(o.win){ d.className="t-win"; d.textContent="VICTORY"; }
    else if(o.dead){ d.className="t-dead"; d.textContent="YOU HAVE DIED"; }
    else { d.className="t-line"; d.innerHTML=linkify(o.text||""); }
    transcript.appendChild(d);
  }
  function printSys(k,t){ const d=document.createElement("div"); d.className="t-sys"; d.innerHTML='<span class="k">'+esc(k)+"</span> "+esc(t); transcript.appendChild(d); }

  function submit(raw){
    raw=(raw||"").trim(); if(!raw) return;
    const ec=raw.toLowerCase().match(/^export\s+(film|video|movie|twee|twine|map|html)$/);
    if(ec){ const e2=document.createElement("div"); e2.className="t-cmd"; e2.textContent=raw; transcript.appendChild(e2);
      const k=ec[1]; if(k==="film"||k==="video"||k==="movie") exportFilm(); else if(k==="map"||k==="html") exportMap(); else exportTwee();
      transcript.scrollTop=transcript.scrollHeight; if(!editing) cmdInput.focus(); return; }
    undoStack.push(snapshot()); if(undoStack.length>50) undoStack.shift();
    history.push(raw); histIdx=history.length;
    const echo=document.createElement("div"); echo.className="t-cmd"; echo.textContent=raw; transcript.appendChild(echo);

    if(res.restart){ doRestart(); return; }
    for(const ln of res.lines) printLine(ln);
    transcript.scrollTop=transcript.scrollHeight;

    if(!editing) cmdInput.focus();
  }
  function updateScore(){ scoreReadout.textContent="SCORE "+state.score+" · MOVES "+state.moves; }
  function doRestart(){ state=newGame(); transcript.innerHTML=""; intro(); loadCell(); updateScore(); journey.length=0; recordJourney("restart"); if(!editing) cmdInput.focus(); }
  function intro(){
    printSys("CINEOSIS ZORK","an operational-pragmatist text adventure · BEFLIX live render");
    printLine({text:"HELP for commands. Nouns below are clickable. The render at right is the live BEFLIX cell — click a source line to bind its box, or click the cell to find the line."});
    for(const ln of describeRoom(state,false)) printLine(ln);

  /* ---------- cell compile / play ---------- */
  function loadCell(){ currentSource=cellSource(state); compileAndPlay(currentSource); }
  function compileAndPlay(source){

    try{ program=parseBelixSource(source); }catch(e){ program={nodes:[]}; }
    const wasPlaying = !player || player.playing;
    if(player) player.pause();

    tTot.textContent=out.frameCount; tScrub.max=Math.max(0,out.frameCount-1); tScrub.value=0; tCur.textContent="0";
    cellRoom.textContent=(out.cellId||"—").replace(/_/g," ");
    const dm = out.metadata.dither || (source.match(/DITHER\(\s*([a-z0-9]+)\s*\)/i)||[])[1] || "bayer8";
    crtLabel.textContent="1-BIT · "+dm.toUpperCase();
    if(out.metadata.error){ crt.classList.add("err"); cellStat.textContent="ERR: "+out.metadata.error.slice(0,28); }
    else { crt.classList.remove("err"); cellStat.textContent=out.frameCount+"f · "+Math.round(out.metadata.executionTimeMs)+"ms"; }
    renderSource(source, out); if(out.ops) renderStackB128(out.ops); else renderStack(program, out);
    boundLine=null; syncBound(); drawBind();
    if(out.frameCount){ if(wasPlaying) player.play(); else player.render(); }
    updatePlayBtn();
  }

  function fmtCode(ln,isCmt){
    if(isCmt) return esc(ln)||" ";
    const m=ln.match(/^(\s*)([A-Za-z]+)(.*)$/);
    if(m) return esc(m[1])+'<span class="verb">'+esc(m[2])+'</span>'+esc(m[3]);
    return esc(ln)||" ";
  }
  function renderSource(source, out){
    if(srcText.value!==source) srcText.value=source;
    srcList.innerHTML="";
    const bindable=new Set();
    for(const fr of out.boxesPerFrame) for(const b of fr) bindable.add(b.line);
    source.split("\n").forEach((ln,i)=>{
      const no=i+1, isCmt=/^\s*c\b/i.test(ln);
      const row=document.createElement("div"); row.className="srcline"+(bindable.has(no)?" bindable":"")+(isCmt?" cmt-line":"");
      row.dataset.line=no;
      row.innerHTML='<span class="ln">'+no+'</span><span class="code">'+fmtCode(ln,isCmt)+"</span>";
      row.addEventListener("click",()=>bindLine(no));
      row.addEventListener("mouseenter",()=>preview(no));
      row.addEventListener("mouseleave",()=>preview(null));
      srcList.appendChild(row);
    });
  }
  function summarize(n){
    if(n.kind==="IF") return n.condition||"";
    if(n.kind==="FOR") return n.range? (n.varName+" "+n.from+".."+n.to) : ("× "+n.count);
    if(n.kind==="ASSIGN") return n.target+" "+n.op+" "+n.expr;
    if(n.kind==="CALL") return n.fn+"("+(n.args||[]).join(",")+")";
    return (n.args||[]).join(", ");
  }
  function renderStack(prog, out){
    [...stackWrap.querySelectorAll(".opbox")].forEach(n=>n.remove());
    const flat=[];
    (function walk(nodes,depth){ for(const n of nodes){ flat.push({node:n,depth}); if(n.body&&n.body.length) walk(n.body,Math.min(depth+1,2)); } })(prog.nodes||[],0);
    stackCount.textContent=flat.length+" ops";
    // foot-anchored: ground is first DOM child (column-reverse => bottom); node0 appended next sits just above ground.
    opMeta={};
    for(const {node,depth} of flat){
      const box=document.createElement("div"); box.className="opbox depth"+depth; box.dataset.line=node.line;
      box.innerHTML='<span class="kind">'+node.kind+'</span><span class="arg">'+esc(summarize(node))+'</span><span class="dl">L'+node.line+"</span>";
      box.addEventListener("click",()=>bindLine(node.line));
      box.addEventListener("mouseenter",()=>preview(node.line));
      box.addEventListener("mouseleave",()=>preview(null));
      stackWrap.appendChild(box);
      if(opMeta[node.line]===undefined) opMeta[node.line]={depth, kind:node.kind, order:depth+1};
    }
    markActive();
  }
  // BEFLIX-128 op stack: one box per CLR / PNT / LIN / REC; REC marks a frame capture
  function renderStackB128(ops){
    [...stackWrap.querySelectorAll(".opbox")].forEach(n=>n.remove());
    const recs=ops.filter(o=>o.op==="REC").length;
    stackCount.textContent = ops.length + " ops \u00B7 " + recs + " rec";
    opMeta = {};
    for(const o of ops){
      const cls = o.op==="REC" ? " rec" : (o.op==="CLR" ? " clr" : "");
      const box=document.createElement("div"); box.className="opbox"+cls; box.dataset.line=o.line;
      let arg="";
      if(o.op==="CLR")      arg="fill \u00B7 i"+o.i;
      else if(o.op==="PNT") arg=o.x+","+o.y+" \u00B7 "+o.w+"\u00D7"+o.h+" \u00B7 i"+o.i;
      else if(o.op==="LIN") arg=o.x1+","+o.y1+"\u2192"+o.x2+","+o.y2+" \u00B7 i"+o.i;
      else if(o.op==="REC") arg="capture \u00D7 "+o.n;
      box.innerHTML='<span class="kind">'+o.op+'</span><span class="arg">'+esc(arg)+'</span><span class="dl">L'+o.line+"</span>";
      box.addEventListener("click",()=>bindLine(o.line));
      box.addEventListener("mouseenter",()=>preview(o.line));
      box.addEventListener("mouseleave",()=>preview(null));
      stackWrap.appendChild(box);
      if(opMeta[o.line]===undefined) opMeta[o.line]={depth:0, kind:o.op, order:1};
    }
    markActive();
  }
  // highlight ops that actually drew in the current frame (first/second-order firing live)
  function markActive(){
    if(!player) return; const live=new Set((player.boxes||[]).map(b=>b.line));
    for(const box of stackWrap.querySelectorAll(".opbox")) box.classList.toggle("active", live.has(+box.dataset.line));
  }

  /* ---------- bidirectional bind ---------- */
  let previewLine=null;
  function preview(line){
    previewLine=line;
    for(const row of srcList.querySelectorAll(".srcline")) row.classList.toggle("preview", line!=null && +row.dataset.line===line);
    for(const box of stackWrap.querySelectorAll(".opbox")) box.classList.toggle("preview", line!=null && +box.dataset.line===line);
    drawBind();
  }
  function orderWord(d){ return d===0? "1 · outer (first-order)" : d===1? "2 · inner (second-order)" : (d+1)+" · inner (order "+(d+1)+")"; }
  function updateBindInfo(){
    if(boundLine==null){ bindInfo.textContent="none — click a source line or the cell"; return; }
    const m=opMeta[boundLine]; const boxes=(player&&player.boxes||[]).filter(b=>b.line===boundLine);
    let geo="non-visual (no box this frame)";
    if(boxes.length){ const b=boxes[0]; geo="box ["+b.x+","+b.y+" "+b.w+"\u00d7"+b.h+"]"+(boxes.length>1?" +"+(boxes.length-1)+" more":""); }
    const kind=m?m.kind:"?"; const ord=m?orderWord(m.depth):"?";
    bindInfo.textContent="L"+boundLine+" · "+kind+" · "+geo+" · ORDER "+ord;
  }
  function syncBound(){
    for(const row of srcList.querySelectorAll(".srcline")) row.classList.toggle("bound", +row.dataset.line===boundLine);
    for(const box of stackWrap.querySelectorAll(".opbox")) box.classList.toggle("bound", +box.dataset.line===boundLine);
    updateBindInfo();
  }
  function bindLine(line){
    boundLine = (boundLine===line)? null : line;
    syncBound();
    if(boundLine!=null){
      const row=srcList.querySelector('.srcline[data-line="'+boundLine+'"]'); if(row) row.scrollIntoView({block:"nearest"});
      const bx=stackWrap.querySelector('.opbox[data-line="'+boundLine+'"]'); if(bx) bx.scrollIntoView({block:"nearest"});
    }
    drawBind();
  }
  function drawBind(){
    const ctx=bindCanvas.getContext("2d"); ctx.clearRect(0,0,bindCanvas.width,bindCanvas.height);
    if(player && previewLine!=null && previewLine!==boundLine){
      ctx.setLineDash([4,3]); ctx.strokeStyle="#000"; ctx.lineWidth=1.5;
      const s=cellCanvas.width/player.g; for(const b of (player.boxes||[]).filter(x=>x.line===previewLine)){ ctx.strokeRect(b.x*s-1,b.y*s-1,b.w*s+2,b.h*s+2); }
      ctx.setLineDash([]);
    }
    if(boundLine==null || !player) return;
    const boxes=(player.boxes||[]).filter(b=>b.line===boundLine);
    const s=cellCanvas.width/player.g;
    for(const b of boxes) regMark(ctx,b,s);
  }
  function regMark(ctx,b,s){
    const pad=2;
    const X=b.x*s-pad, Y=b.y*s-pad, W=b.w*s+2*pad, H=b.h*s+2*pad;
    const L=Math.max(7, Math.min(W,H)*0.30);
    function corners(){ ctx.beginPath();
      ctx.moveTo(X,Y+L); ctx.lineTo(X,Y); ctx.lineTo(X+L,Y);
      ctx.moveTo(X+W-L,Y); ctx.lineTo(X+W,Y); ctx.lineTo(X+W,Y+L);
      ctx.moveTo(X,Y+H-L); ctx.lineTo(X,Y+H); ctx.lineTo(X+L,Y+H);
      ctx.moveTo(X+W-L,Y+H); ctx.lineTo(X+W,Y+H); ctx.lineTo(X+W,Y+H-L);
      ctx.stroke(); }
    ctx.lineJoin="miter"; ctx.strokeStyle="#fff"; ctx.lineWidth=5; corners();   // halo (1-bit safe)
    ctx.strokeStyle="#000"; ctx.lineWidth=2; corners();                          // mark
  }
  // viewport -> source line (clicks pass through bindCanvas which is pointer-events:none)
  cellCanvas.style.cursor="crosshair";
  cellCanvas.addEventListener("click",(e)=>{
    if(!player) return;
    const r=cellCanvas.getBoundingClientRect();
    const gx=(e.clientX-r.left)/r.width*player.g, gy=(e.clientY-r.top)/r.height*player.g;
    let hit=null;
    for(const b of (player.boxes||[])) if(gx>=b.x && gx<b.x+b.w && gy>=b.y && gy<b.y+b.h) hit=b; // last drawn wins (topmost)
    if(hit){ boundLine = (boundLine===hit.line)? boundLine : hit.line; syncBound();
      const row=srcList.querySelector('.srcline[data-line="'+boundLine+'"]'); if(row) row.scrollIntoView({block:"nearest"});
      drawBind(); }
    else { boundLine=null; syncBound(); drawBind(); }
  });

  /* ---------- transport ---------- */
  function updatePlayBtn(){ tPlay.textContent=(player&&player.playing)?"Pause":"Play"; }
  tPlay.onclick=()=>{ if(!player||!player.total) return; if(player.playing) player.pause(); else player.play(); updatePlayBtn(); };
  tBack.onclick=()=>{ if(player&&player.total){ player.pause(); player.seek(player.idx-1); updatePlayBtn(); } };
  tFwd.onclick =()=>{ if(player&&player.total){ player.pause(); player.seek(player.idx+1); updatePlayBtn(); } };
  tScrub.oninput=()=>{ if(player&&player.total){ player.pause(); player.seek(+tScrub.value); updatePlayBtn(); } };

  /* ---------- edit toggle ---------- */
  editToggle.onclick=()=>{
    editing=!editing;
    if(editing){ srcList.style.display="none"; srcEdit.style.display="flex"; srcText.value=currentSource; editToggle.textContent="Done"; srcText.focus(); }
    else { srcEdit.style.display="none"; srcList.style.display="block"; editToggle.textContent="Edit"; currentSource=srcText.value; compileAndPlay(currentSource); }
  };
  srcText.addEventListener("keydown",(e)=>{ if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){ e.preventDefault(); currentSource=srcText.value; compileAndPlay(currentSource); } });

  (function buildDeck(){
    // compass d-pad (movement lives here, in one compact control)
    document.querySelectorAll(".dpad button[data-cmd]").forEach(btn=>{ btn.addEventListener("click",()=>submit(btn.dataset.cmd)); });

    // bottom sheets: CODE / STACK / MENU rise within the work area, beneath the film.
    // Only one is open at a time; the film above always stays visible.
    function syncMore(){ if(!moreBtn) return; const open=document.body.classList.contains("sheet-menu");
      moreBtn.textContent=open?"LESS \u2212":"MORE +"; moreBtn.setAttribute("aria-expanded", open?"true":"false"); }
    function closeSheets(){ document.body.classList.remove("sheet-code","sheet-stack","sheet-menu"); syncMore(); try{ cmdInput.focus(); }catch(e){} }
    function openSheet(name){
      const cls="sheet-"+name, was=document.body.classList.contains(cls);
      document.body.classList.remove("sheet-code","sheet-stack","sheet-menu");
      if(!was){ document.body.classList.add(cls); if(name==="stack" && player) markActive(); }
      syncMore();
    }
    document.querySelectorAll("[data-sheet]").forEach(b=>b.addEventListener("click",()=>openSheet(b.dataset.sheet)));
    document.querySelectorAll("[data-sheet-close]").forEach(b=>b.addEventListener("click",closeSheets));
    if(moreBtn) moreBtn.addEventListener("click",()=>openSheet("menu"));   // desktop: MORE toggles the inline tray

    // MENU sheet: clear sections, big touch targets
    const acts=[["Look","look"],["Inventory","inventory"],["Wait","wait"],["Score","score"],["Help","help"],["Restart","restart"]];
    const exps=[["Export film","__film","MP4 / WebM"],["Export Twine","__twee",".twee story"],["Export map","__map","branch HTML"]];
    tray.innerHTML="";
    const la=document.createElement("div"); la.className="menu-label"; la.textContent="Actions"; tray.appendChild(la);
    const ga=document.createElement("div"); ga.className="menu-grid";
    for(const [lab,c] of acts){ const b=document.createElement("button"); b.className="menu-btn"; b.textContent=lab; b.onclick=()=>{ submit(c); closeSheets(); }; ga.appendChild(b); }
    tray.appendChild(ga);
    const le=document.createElement("div"); le.className="menu-label"; le.textContent="Export"; tray.appendChild(le);
    const ge=document.createElement("div"); ge.className="menu-col";
    for(const [lab,c,sub] of exps){ const b=document.createElement("button"); b.className="menu-btn wide";
      b.innerHTML='<span>'+lab+'</span><span class="sub">'+sub+'</span>';
      b.onclick=()=>{ if(c==="__film") exportFilm(); else if(c==="__twee") exportTwee(); else exportMap(); }; ge.appendChild(b); }
    tray.appendChild(ge);
  })();

  /* ---------- input ---------- */
  cmdInput.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){ const v=cmdInput.value; cmdInput.value=""; submit(v); }
    else if(e.key==="ArrowUp"){ if(history.length){ histIdx=Math.max(0,histIdx-1); cmdInput.value=history[histIdx]||""; e.preventDefault(); } }
    else if(e.key==="ArrowDown"){ if(history.length){ histIdx=Math.min(history.length,histIdx+1); cmdInput.value=history[histIdx]||""; e.preventDefault(); } }
  });
  transcript.addEventListener("click",(e)=>{
    const r=e.target.closest("button.ref"); if(!r) return;
    if(r.dataset.ex) submit("examine "+ITEMS[r.dataset.ex].syn[0]);
    else if(r.dataset.go) submit(r.dataset.go);
    cmdInput.focus();
  });

  /* ---------- save / restore / undo (in-memory) ---------- */
  function refresh(msg){ if(msg) printSys("STATE", msg); for(const ln of describeRoom(state,true)) printLine(ln); transcript.scrollTop=transcript.scrollHeight; updateScore(); loadCell(); cmdInput.focus(); }
  btnUndo.onclick=()=>{ if(!undoStack.length){ printSys("STATE","Nothing to undo."); return; } state=undoStack.pop(); refresh("Undone — back one move."); };
  btnSave.onclick=()=>{ savedSlot=snapshot(); printSys("STATE","Position saved."); cmdInput.focus(); };
  btnLoad.onclick=()=>{ if(!savedSlot){ printSys("STATE","No saved position."); return; } undoStack.push(snapshot()); state=clone(savedSlot); refresh("Restored saved position."); };

  /* ---------- exports: journey film (video) + Twine .twee + HTML branch map ---------- */
  function download(name, data, mime){
    const blob = (data instanceof Blob) ? data : new Blob([data], { type: mime || "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ a.remove(); URL.revokeObjectURL(url); }, 1500);
  }
  function recordJourney(cmd){
    if(!currentSource) return;
    const last = journey[journey.length-1];
    if(last && last.source===currentSource) return;     // only log genuine scene changes
    const room = state.dead ? "THE VOID" : state.won ? "VICTORY" : (ROOMS[state.here] ? ROOMS[state.here].name : "\u2014");
    journey.push({ source: currentSource, room: room, cmd: cmd || "" });
  }
  function exportTwee(){
    try{ download("cineosis-zork.twee", buildTwee(), "text/plain;charset=utf-8");
      printSys("EXPORT","Twee exported \u2014 in Twine, use Import From File to load the branch graph."); }
    catch(e){ printSys("EXPORT","Twee export failed: "+e.message); }
  }
  function exportMap(){
    try{ download("cineosis-zork-map.html", buildMapHTML(), "text/html;charset=utf-8");
      printSys("EXPORT","Branch map exported \u2014 open the HTML in any browser to see every room and exit."); }
    catch(e){ printSys("EXPORT","Map export failed: "+e.message); }
  }
  async function exportFilm(){
    if(filming){ printSys("EXPORT","Already recording \u2014 one moment."); return; }
    if(typeof MediaRecorder==="undefined" || !HTMLCanvasElement.prototype.captureStream){
      printSys("EXPORT","This browser can't record video. Try Chrome, Edge or Firefox (Safari gives MP4). Twee and Map export work everywhere."); return; }
    if(journey.length===0){ printSys("EXPORT","No journey yet \u2014 move through a few rooms first, then export the film."); return; }
    let mime=""; for(const m of ["video/mp4;codecs=avc1.42E01E","video/mp4","video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"]){
      try{ if(MediaRecorder.isTypeSupported(m)){ mime=m; break; } }catch(e){} }
    filming=true;
    const w=512, capH=46, H=w+capH;
    const c=document.createElement("canvas"); c.width=w; c.height=H;
    c.style.position="fixed"; c.style.left="-99999px"; c.style.top="0"; document.body.appendChild(c);
    const x=c.getContext("2d"); x.imageSmoothingEnabled=false;
    const tmp=document.createElement("canvas"); const tx=tmp.getContext("2d");
    x.fillStyle="#fff"; x.fillRect(0,0,w,H);
    const stream=c.captureStream(30);
    let rec; try{ rec=new MediaRecorder(stream, mime?{ mimeType:mime, videoBitsPerSecond:6000000 }:undefined); }
    catch(e){ filming=false; c.remove(); printSys("EXPORT","Couldn't start the recorder: "+e.message); return; }
    const chunks=[]; rec.ondataavailable=e=>{ if(e.data && e.data.size) chunks.push(e.data); };
    const stopped=new Promise(res=>{ rec.onstop=res; });
    const exo=new CellExecutor({ sprites: SPRITES });
    const fps=15, sleep=ms=>new Promise(r=>setTimeout(r,ms));
    printSys("EXPORT","Recording "+journey.length+" scenes\u2026 keep this tab in front \u2014 it records in real time.");
    rec.start();
    try{
      for(let j=0;j<journey.length;j++){
        const entry=journey[j]; let out;
        try{ out=exo.executeCell(entry.source); }catch(e){ continue; }
        const fr=out.frames; if(!fr || !fr.length) continue;
        const total=Math.max(fr.length, 16);
        for(let f=0; f<total; f++){
          const img=fr[f % fr.length]; if(tmp.width!==img.width){ tmp.width=img.width; tmp.height=img.height; } tx.putImageData(img,0,0);
          x.imageSmoothingEnabled=false; x.fillStyle="#fff"; x.fillRect(0,0,w,w); x.drawImage(tmp,0,0,w,w);
          x.fillStyle="#000"; x.fillRect(0,w,w,capH);
          x.fillStyle="#fff"; x.textBaseline="middle"; x.textAlign="left";
          x.font="700 21px 'Arial Narrow',Arial,sans-serif"; x.fillText((entry.room||"").toUpperCase(), 12, w+capH/2-1);
          x.textAlign="right"; x.font="500 14px ui-monospace,Menlo,monospace"; x.fillText("> "+(entry.cmd||"start"), w-12, w+capH/2-1);
          x.textAlign="left"; x.fillStyle="#000"; x.fillRect(0,0,98,18);
          x.fillStyle="#fff"; x.font="700 11px 'Arial Narrow',Arial,sans-serif"; x.fillText("SCENE "+(j+1)+"/"+journey.length, 6, 10);
          await sleep(1000/fps);
        }
      }
    }catch(e){ /* stop and salvage whatever recorded */ }
    await sleep(160); try{ rec.stop(); }catch(e){} await stopped;
    c.remove(); filming=false;
    const ext = (mime.indexOf("mp4")>=0) ? "mp4" : "webm";
    const blob=new Blob(chunks, { type: mime || "video/webm" });
    if(!blob.size){ printSys("EXPORT","Recording produced no data \u2014 the browser may have blocked capture in this context. Try opening the downloaded HTML file directly."); return; }
    download("cineosis-zork-film."+ext, blob, blob.type);
    printSys("EXPORT","Film exported \u2014 "+ext.toUpperCase()+", "+journey.length+" scenes, "+(blob.size/1024|0)+" KB.");
  }

  /* ---------- mobile workspace switcher (film stays pinned; only the lower zone switches) ---------- */
  function setWS(w){
    document.body.classList.remove("ws-play","ws-code","ws-stack");
    document.body.classList.add("ws-"+w);
    if(wsw) for(const b of wsw.querySelectorAll("button")) b.classList.toggle("on", b.dataset.ws===w);
    if(w==="play"){ try{ cmdInput.focus(); }catch(e){} transcript.scrollTop=transcript.scrollHeight; }
    if(w==="stack" && player) markActive();
  }
  if(wsw) wsw.addEventListener("click",(e)=>{ const b=e.target.closest("button"); if(b) setWS(b.dataset.ws); });

  /* ---------- boot ---------- */
  setWS("play");
  intro(); loadCell(); updateScore(); recordJourney("start"); cmdInput.focus();
  // the film is square + sized to its panel; re-fit on viewport changes
  let _raf=null;
  // Pin the app to the actually-visible viewport. With no in-app scrolling this stays steady
  // normally, and when the keyboard opens it shrinks to sit above it — so the text input never
  // hides or jumps and nothing reflows mid-type.
  (function stableHeight(){
    const vv = window.visualViewport; if(!vv) return;
    let raf=null;
    const apply=()=>{ document.documentElement.style.setProperty("--app-h", Math.round(vv.height)+"px");
      document.body.classList.toggle("kbd", (window.innerHeight - vv.height) > 120); };
    const onVV=()=>{ if(raf) cancelAnimationFrame(raf); raf=requestAnimationFrame(apply); };
    vv.addEventListener("resize", onVV); apply();
  })();
  window.addEventListener("resize", ()=>{ if(_raf) cancelAnimationFrame(_raf); _raf=requestAnimationFrame(()=>{ if(player){ player.render(); drawBind(); } }); });
})();
</script>
</body>
