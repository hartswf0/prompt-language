<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CINEOSIS ZORK — THE OPERATIONAL PRAGMATIST</title>
<style>
/* =====================================================================
   POML v2.0 — OPERATIONAL PRAGMATIST RENDER
   Palette : ABSOLUTE black + white only. No mid-tones, no grays.
             Tone in the cell viewport is an ILLUSION from 1-bit dither.
   Depth   : gradients, not glassmorphism (no blur — it destroys density).
   Type    : heavy condensed grotesque (display) + teletype mono (operate).
   Signature: registration-bracket BIND marks linking source <-> canvas.
   ===================================================================== */
:root{
  --paper:#ffffff;
  --ink:#000000;
  --scale:6;
  --disp: calc(64 * var(--scale));
  --mono: ui-monospace, "SFMono-Regular", "Cascadia Code", Menlo, Consolas, monospace;
  --grot: "Arial Narrow", "Helvetica Neue Condensed", "Helvetica Neue", Arial, sans-serif;
}
*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; }
body{
  background:var(--paper); color:var(--ink);
  font-family:var(--mono); font-size:13px; line-height:1.55;
  -webkit-font-smoothing:none; overflow:hidden;
}
button,input,textarea{ font:inherit; color:inherit; }

.shell{ height:100vh; height:100svh; height:var(--app-h, 100svh); display:flex; flex-direction:column; overflow:hidden;
  max-width:1320px; margin:0 auto; border-left:2px solid var(--ink); border-right:2px solid var(--ink); }

/* compact masthead: one line, reclaims the prime top space, live score on the right */
header.masthead{ flex:none; border-bottom:2px solid var(--ink); display:flex; align-items:center; gap:10px; padding:4px 11px; }
.wordmark{ font-family:var(--grot); font-weight:800; font-stretch:condensed;
  font-size:18px; letter-spacing:-.01em; text-transform:uppercase; line-height:1; white-space:nowrap; }
.wordmark .thin{ font-weight:400; }
.tag{ font-family:var(--grot); font-weight:700; font-stretch:condensed; text-transform:uppercase;
  letter-spacing:.16em; font-size:9.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0;
  border-left:2px solid var(--ink); padding-left:9px; }
.mhscore{ margin-left:auto; font-size:10.5px; letter-spacing:.04em; white-space:nowrap; flex:none; }

/* mobile workspace switcher — only the lower zone switches; the film stays pinned */
.wsw{ display:none; flex:none; }
.wsw button{ flex:1; font-family:var(--grot); font-weight:800; font-stretch:condensed; text-transform:uppercase;
  letter-spacing:.12em; font-size:13px; background:var(--paper); color:var(--ink);
  border:0; border-right:2px solid var(--ink); padding:11px 0; cursor:pointer; }
.wsw button:last-child{ border-right:0; }
.wsw button.on{ background:var(--ink); color:var(--paper); }

/* ---- INSTRUMENT DASHBOARD: fixed, no page scroll, everything visible ----
   desktop: game (tall, left) | film over [source | stack]                       */
main{ flex:1; min-height:0; display:grid; gap:0;
  grid-template-columns: minmax(300px,1.1fr) minmax(260px,1fr) minmax(220px,1fr);
  grid-template-rows: minmax(0,0.92fr) minmax(0,1.08fr);
  grid-template-areas:
    "game film   film"
    "game source stack"; }
.panel{ display:flex; flex-direction:column; min-height:0; min-width:0; overflow:hidden; border-left:2px solid var(--ink); }
.p-game{ grid-area:game; border-left:0; }
.p-film{ grid-area:film; border-bottom:2px solid var(--ink); }
.p-source{ grid-area:source; }
.p-stack{ grid-area:stack; }

.barhead{ flex:none; font-family:var(--grot); font-weight:800; font-stretch:condensed; text-transform:uppercase;
  letter-spacing:.12em; font-size:10.5px; background:var(--ink); color:var(--paper);
  padding:3px 8px; display:flex; align-items:center; gap:6px; white-space:nowrap; overflow:hidden; }
.barhead .right{ margin-left:auto; font-weight:400; letter-spacing:.06em; font-size:10.5px; }
.barhead button{ font-family:var(--grot); font-weight:700; font-stretch:condensed; text-transform:uppercase;
  letter-spacing:.1em; font-size:10.5px; background:var(--paper); color:var(--ink);
  border:0; padding:2px 8px; cursor:pointer; }
.barhead button:hover{ outline:2px solid var(--paper); outline-offset:-2px; }

.transcript{ flex:1; overflow:auto; padding:11px 13px 8px; min-height:0; background:var(--paper); }
.t-room{ font-family:var(--grot); font-weight:800; font-stretch:condensed; text-transform:uppercase;
  letter-spacing:.08em; font-size:15px; margin:14px 0 3px; padding-bottom:2px;
  border-bottom:2px solid var(--ink); display:inline-block; }
.t-line{ margin:2px 0; white-space:pre-wrap; }
.t-sys{ margin:3px 0; }
.t-sys .k{ background:var(--ink); color:var(--paper); padding:0 5px;
  font-family:var(--grot); font-weight:700; font-stretch:condensed; letter-spacing:.1em; font-size:10.5px; }
.t-cmd{ margin:9px 0 1px; font-weight:700; }
.t-cmd::before{ content:"> "; }
.t-win,.t-dead{ font-family:var(--grot); font-weight:800; font-stretch:condensed;
  text-transform:uppercase; letter-spacing:.06em; font-size:15px; margin:8px 0;
  background:var(--ink); color:var(--paper); display:inline-block; padding:3px 9px; }
.exits{ font-size:11.5px; letter-spacing:.04em; margin-top:4px; }
.exits b{ font-weight:400; }

.ref{ font:inherit; background:none; border:0; padding:0 1px; cursor:pointer;
  color:var(--ink); border-bottom:1px solid var(--ink); }
.ref:hover{ background:var(--ink); color:var(--paper); }
.ref:focus-visible{ outline:2px solid var(--ink); outline-offset:1px; }

.prompt{ flex:none; border-top:2px solid var(--ink); display:flex; align-items:center; }
.prompt .car{ font-family:var(--grot); font-weight:800; padding:0 12px; font-size:16px; user-select:none; }
.prompt input{ flex:1; border:0; outline:0; background:transparent; padding:11px 12px 11px 0;
  font-size:14px; caret-color:var(--ink); }
.prompt input::placeholder{ color:var(--ink); opacity:.45; }

.chip{ font-family:var(--grot); font-weight:700; font-stretch:condensed; text-transform:uppercase;
  letter-spacing:.08em; font-size:11px; background:var(--paper); color:var(--ink);
  border:0; border-right:2px solid var(--ink); padding:6px 11px; cursor:pointer; }
.chip:hover{ background:var(--ink); color:var(--paper); }
.chip:focus-visible{ outline:2px solid var(--ink); outline-offset:-3px; }
.chip.sep{ flex:1; border-right:2px solid var(--ink); cursor:default;
  background:repeating-linear-gradient(90deg,var(--ink) 0 1px, var(--paper) 1px 4px); }
.chip.sep:hover{ background:repeating-linear-gradient(90deg,var(--ink) 0 1px, var(--paper) 1px 4px); }
/* compact control deck: compass d-pad + collapsible MORE tray (declutters the foot) */
.deck{ flex:none; border-top:2px solid var(--ink); display:flex; align-items:stretch; }
.dpad{ display:grid; grid-template-columns:repeat(3,40px); grid-auto-rows:31px; background:var(--ink); gap:2px; border-right:2px solid var(--ink); }
.dpad>button,.dpad>span{ background:var(--paper); border:0; margin:0; display:flex; align-items:center; justify-content:center; }
.dpad>button{ font-family:var(--grot); font-weight:800; font-stretch:condensed; font-size:11px; letter-spacing:.03em; color:var(--ink); cursor:pointer; padding:0; }
.dpad>button:hover{ background:var(--ink); color:var(--paper); }
.dpad>button:active{ background:var(--ink); color:var(--paper); }
.dpad .look svg{ display:block; }
.deck .more{ flex:1; font-family:var(--grot); font-weight:800; font-stretch:condensed; text-transform:uppercase;
  letter-spacing:.12em; font-size:12px; background:var(--paper); color:var(--ink); border:0; cursor:pointer; }
.deck .more:hover{ background:var(--ink); color:var(--paper); }
.tray{ flex:none; border-top:2px solid var(--ink); display:flex; flex-wrap:wrap; }
.tray[hidden]{ display:none; }

.film-body{ flex:1; min-height:0; display:flex; overflow:hidden; }
.crt-wrap{ flex:0 0 auto; display:flex; align-items:stretch; padding:7px; min-width:0; }
.crt{ position:relative; height:100%; aspect-ratio:1/1; border:2px solid var(--ink); background:var(--paper); }
.crt canvas{ position:absolute; inset:0; width:100%; height:100%; image-rendering:pixelated; }
#bindCanvas{ pointer-events:none; }
.crt .crtlabel{ position:absolute; left:0; bottom:0;
  font-family:var(--grot); font-weight:700; font-stretch:condensed; letter-spacing:.08em; font-size:9px;
  background:var(--ink); color:var(--paper); padding:1px 5px; }
.crt.err{ outline:2px solid var(--ink); outline-offset:2px; }

/* data HUD beside the square display — fills the width, reads as an instrument */
.hud{ flex:1 1 0; min-width:0; display:flex; flex-direction:column; border-left:2px solid var(--ink); overflow:hidden; }
.hud-frame{ flex:none; padding:5px 10px 3px; border-bottom:2px solid var(--ink);
  font-family:var(--mono); font-weight:700; font-size:clamp(26px,4.4vw,46px); line-height:.95; letter-spacing:-.02em; }
.hud-frame .sl{ font-size:11px; font-weight:400; letter-spacing:.06em; }
.hud-row{ flex:none; display:flex; justify-content:space-between; gap:8px; padding:3px 10px; font-size:10.5px;
  border-bottom:1px solid var(--ink); white-space:nowrap; overflow:hidden; }
.hud-row .hk{ font-family:var(--grot); font-weight:800; font-stretch:condensed; letter-spacing:.1em; }
.hud-row span:last-child{ overflow:hidden; text-overflow:ellipsis; }
.hud-bind{ flex:1; min-height:0; padding:5px 10px; font-size:10.5px; overflow:auto; }
.hud-bind .hk{ font-family:var(--grot); font-weight:800; font-stretch:condensed; letter-spacing:.1em; display:block; margin-bottom:2px; }
.transport{ flex:none; display:flex; align-items:center; border-top:2px solid var(--ink); }
.transport button{ font-family:var(--grot); font-weight:700; font-stretch:condensed; text-transform:uppercase;
  letter-spacing:.05em; font-size:10px; background:var(--paper); color:var(--ink);
  border:0; border-right:2px solid var(--ink); padding:5px 8px; cursor:pointer; }
.transport button:hover{ background:var(--ink); color:var(--paper); }
.transport button[disabled]{ cursor:not-allowed; opacity:.4; }
.transport input[type=range]{ flex:1; min-width:30px; margin:0 7px; accent-color:var(--ink); }

.srcwrap{ flex:1; min-height:0; overflow:auto; font-size:12px; }
.srcline{ display:flex; cursor:pointer; }
.srcline:hover{ box-shadow:inset 2px 0 0 var(--ink); }
.srcline .ln{ width:34px; flex:none; text-align:right; padding:0 7px 0 0; color:var(--ink);
  border-right:2px solid var(--ink); user-select:none; opacity:.5; }
.srcline .code{ padding:0 8px; white-space:pre; }
.srcline.bindable .ln{ opacity:1; }
.srcline.bound{ background:var(--ink); color:var(--paper); }
.srcline.bound .ln{ color:var(--paper); opacity:1; border-right-color:var(--paper); }
.srcedit{ flex:1; min-height:0; }
.srcedit textarea{ width:100%; height:100%; border:0; outline:0; resize:none; background:var(--paper);
  color:var(--ink); padding:8px 10px; font-size:12px; line-height:1.5; white-space:pre; tab-size:2; caret-color:var(--ink); }

.stackwrap{ flex:1; min-height:90px; overflow:auto;
  display:flex; flex-direction:column-reverse; justify-content:flex-start; position:relative; }
.ground{ flex:none; height:16px; border-top:2px solid var(--ink);
  background:linear-gradient(180deg, var(--ink), var(--paper)); position:sticky; bottom:0; }
.ground::after{ content:"FOOT"; position:absolute; left:7px; top:1px;
  font-family:var(--grot); font-weight:800; font-stretch:condensed; letter-spacing:.14em; font-size:8px; color:var(--paper); }
.opbox{ flex:none; margin:3px 8px 0; border:2px solid var(--ink); padding:2px 7px; cursor:pointer;
  display:flex; gap:8px; align-items:baseline; background:var(--paper); }
.opbox:hover{ box-shadow:inset 0 0 0 1px var(--ink); }
.opbox.bound{ background:var(--ink); color:var(--paper); }
.opbox .kind{ font-family:var(--grot); font-weight:800; font-stretch:condensed; letter-spacing:.06em; font-size:11px; min-width:74px; }
.opbox .arg{ font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.opbox .dl{ margin-left:auto; opacity:.45; font-size:9px; }
.opbox.bound .dl{ opacity:1; }
.opbox.depth1{ margin-left:22px; }
.opbox.depth2{ margin-left:40px; }
.opbox.active .kind::after{ content:" \2022"; }            /* fired this frame */
.opbox.preview{ outline:2px dashed var(--ink); outline-offset:-2px; }
.srcline.preview{ outline:2px dashed var(--ink); outline-offset:-2px; }

::-webkit-scrollbar{ width:12px; height:12px; }
::-webkit-scrollbar-track{ background:var(--paper); border-left:2px solid var(--ink); }
::-webkit-scrollbar-thumb{ background:var(--ink); border:3px solid var(--paper); }

/* ---- NARROW SCREENS: a screen-forward player. The 1-bit render is the hero;
        code & stack become on-demand overlays so nothing crowds the picture. ---- */
.mob-only{ display:none; }
.desk-only{ display:inline-flex; }
.ovl-back{ display:none; }
.sheet-tabs{ display:none; }
#tray{ display:none; flex-direction:column; gap:6px; padding:8px; }
body.sheet-menu #tray{ display:flex; }              /* desktop: inline action tray under the deck */
/* MENU sheet — sectioned, bold, neo-brutalist (used on desktop tray + mobile sheet) */
.menu-label{ font-family:var(--grot); font-weight:800; font-stretch:condensed; text-transform:uppercase;
  letter-spacing:.14em; font-size:10.5px; padding:8px 2px 4px; }
.menu-grid{ display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.menu-col{ display:flex; flex-direction:column; gap:7px; }
.menu-btn{ font-family:var(--grot); font-weight:800; font-stretch:condensed; text-transform:uppercase;
  letter-spacing:.07em; font-size:13px; background:var(--paper); color:var(--ink); border:2px solid var(--ink);
  padding:13px 12px; cursor:pointer; box-shadow:3px 3px 0 var(--ink); min-height:48px;
  display:flex; align-items:center; justify-content:center; text-align:center; }
.menu-btn:hover{ background:var(--ink); color:var(--paper); }
.menu-btn:active{ transform:translate(3px,3px); box-shadow:none; }
.menu-btn.wide{ flex-direction:column; align-items:flex-start; justify-content:center; gap:2px; text-align:left; }
.menu-btn.wide .sub{ font-family:var(--mono); font-weight:400; font-stretch:normal; letter-spacing:0; text-transform:none; font-size:10px; }
/* op-stack: mark REC capture rows; code: highlight verbs + comments (pure B/W) */
.opbox.rec{ border-left:5px solid var(--ink); }
.opbox.rec .kind, .opbox.clr .kind{ opacity:1; }
.srcline .verb{ background:var(--ink); color:var(--paper); padding:0 4px; font-weight:700; }
.srcline.cmt-line .code{ font-style:italic; }
.srcline.cmt-line .verb{ background:none; color:inherit; padding:0; }
@media (max-width:760px){
  .tag{ display:none; }
  .wsw{ display:none; }
  .mob-only{ display:inline-flex; }
  .desk-only{ display:none !important; }
  main{
    grid-template-columns: 1fr;
    grid-template-rows: auto minmax(0,1fr);
    grid-template-areas:
      "film"
      "work"; }
  .panel{ border-left:0; }
  .p-film{ grid-area:film; border-bottom:2px solid var(--ink); }
  .p-game{ grid-area:work; border-bottom:0; position:relative; }   /* host for sheets */
  /* THE SCREEN — a big hero, capped so code/stack sheets sit in the zone beneath it */
  .film-body{ flex-direction:column; }
  .crt-wrap{ flex:none; width:100%; padding:0; display:flex; justify-content:center;
    background:var(--paper); border-bottom:2px solid var(--ink); }
  .crt{ width:min(100%, 34svh); height:auto; aspect-ratio:1/1; border:0; }
  .crt .crtlabel{ font-size:9px; }
  /* thin transport under the screen; the instrument readouts (EXEC/BIND) drop away */
  .hud{ flex:none; flex-direction:row; align-items:center; gap:6px; border-left:0; padding:0; }
  .hud .hud-row, .hud .hud-bind{ display:none; }
  .hud-frame{ order:2; margin-left:auto; border-bottom:0; font-size:16px; padding:7px 13px; white-space:nowrap; }
  .hud-frame .sl{ font-size:10px; }
  .transport{ order:1; flex:1; border-top:0; }
  .transport button{ padding:9px 13px; font-size:12px; }
  .transport input[type=range]{ flex:1; margin:0 8px; }
  /* CODE · STACK · MENU — bottom sheets that rise WITHIN the work area, beneath the film */
  .p-source, .p-stack{ grid-area:work; z-index:30; border-left:0; border-top:2px solid var(--ink); background:var(--paper);
    display:flex; transform:translateY(100%); transition:transform .15s ease-out; }
  .sheet-pane{ position:absolute; inset:0; z-index:30; background:var(--paper); border-top:2px solid var(--ink);
    display:flex; flex-direction:column; transform:translateY(100%); transition:transform .15s ease-out; }
  #tray{ display:flex; flex-direction:column; flex:1; overflow-y:auto; padding:12px; gap:5px; }
  body.sheet-code  .p-source{ transform:translateY(0); }
  body.sheet-stack .p-stack{ transform:translateY(0); }
  body.sheet-menu  .sheet-pane{ transform:translateY(0); }
  /* in-sheet tab bar: switch Stack/Code/Menu or close, without leaving the sheet */
  .sheet-tabs{ display:flex; flex:none; border-bottom:2px solid var(--ink); }
  .st-tab{ flex:1; font-family:var(--grot); font-weight:800; font-stretch:condensed; text-transform:uppercase;
    letter-spacing:.1em; font-size:12px; background:var(--paper); color:var(--ink); border:0;
    border-right:2px solid var(--ink); padding:12px 0; cursor:pointer; }
  .st-x{ flex:0 0 46px; background:var(--ink); color:var(--paper); border:0; font-size:14px; font-weight:800; cursor:pointer; }
  body.sheet-stack .st-tab[data-sheet="stack"],
  body.sheet-code  .st-tab[data-sheet="code"],
  body.sheet-menu  .st-tab[data-sheet="menu"]{ background:var(--ink); color:var(--paper); }
  .p-source .barhead, .p-stack .barhead{ display:none; }   /* the tab bar is the header on mobile */
  /* readability */
  .barhead{ font-size:11px; padding:5px 9px; letter-spacing:.09em; }
  .barhead button{ font-size:11px; padding:3px 9px; }
  .transcript{ padding:12px 14px 8px; font-size:14px; }
  .srcwrap{ font-size:13px; } .srcline .ln{ width:30px; }
  .opbox{ margin:4px 9px 0; } .opbox .kind{ min-width:66px; font-size:12px; } .opbox .arg{ font-size:11px; }
  .prompt input{ padding:14px 12px 14px 0; font-size:16px; }
  .chip{ padding:11px 15px; font-size:13px; }
  .dpad{ grid-template-columns:repeat(3,46px); grid-auto-rows:34px; }
  /* the bottom bar: compass + STACK / CODE / MENU tabs (replaces MORE/LESS) */
  .deck .more{ font-size:12px; letter-spacing:.04em; border-right:2px solid var(--ink); }
  .deck .more:last-child{ border-right:0; }
  /* keyboard up = short, near-square viewport: the picture yields. Collapse the render +
     transport + nav to just the room-label strip so transcript + input own the space. */
  body.kbd .deck, body.kbd .hud, body.kbd .crt-wrap{ display:none; }
  body.kbd .p-film{ border-bottom:2px solid var(--ink); }
}
@media (max-width:420px){
  .crt{ width:min(100%, 32svh); }
  .dpad{ grid-template-columns:repeat(3,42px); grid-auto-rows:32px; }
  .deck .more{ font-size:11px; letter-spacing:0; }
}

@media (prefers-reduced-motion:reduce){ *{ animation:none !important; } }
</style>
</head>
<body>
<div class="shell">

  <header class="masthead">
    <span class="wordmark">CINEOSIS<span class="thin">·</span>ZORK</span>
    <span class="tag">1-BIT Instrument</span>
    <span class="mhscore" id="scoreReadout">SCORE 0 · MOVES 0</span>
  </header>

  <main>
    <!-- FILM — the cell render, always visible -->
    <section class="panel p-film">
      <div class="barhead">Cell · <span id="cellRoom">WEST OF HOUSE</span></div>
      <div class="film-body">
        <div class="crt-wrap">
          <div class="crt" id="crt">
            <canvas id="cellCanvas" width="384" height="384"></canvas>
            <canvas id="bindCanvas" width="384" height="384"></canvas>
            <span class="crtlabel" id="crtLabel">1-BIT</span>
          </div>
        </div>
        <div class="hud">
          <div class="hud-frame"><span id="tCur">0</span><span class="sl">/<span id="tTot">0</span> FRAME</span></div>
          <div class="hud-row"><span class="hk">EXEC</span><span id="cellStat">&mdash;</span></div>
          <div class="hud-bind"><span class="hk">BIND</span><span id="bindInfo">click a source line, or the cell</span></div>
          <div class="transport">
            <button id="tPlay">Pause</button>
            <button id="tBack" title="step back">&#9664;</button>
            <button id="tFwd" title="step forward">&#9654;</button>
            <input id="tScrub" type="range" min="0" max="0" value="0" step="1" aria-label="frame">
          </div>
        </div>
      </div>
    </section>

    <!-- BEFLIX SOURCE — bind surface -->
    <nav class="wsw" id="wsw">
      <button data-ws="play" class="on" type="button">Play</button>
      <button data-ws="code" type="button">Code</button>
      <button data-ws="stack" type="button">Stack</button>
    </nav>

    <section class="panel p-source">
      <div class="sheet-tabs"><button class="st-tab" type="button" data-sheet="stack">Stack</button><button class="st-tab" type="button" data-sheet="code">Code</button><button class="st-tab" type="button" data-sheet="menu">Menu</button><button class="st-x" type="button" data-sheet-close aria-label="Close">&#10005;</button></div>
      <div class="barhead">Source
        <button id="editToggle">Edit</button>
      </div>
      <div class="srcwrap" id="srcList"></div>
      <div class="srcedit" id="srcEdit" style="display:none">
        <textarea id="srcText" spellcheck="false"></textarea>
      </div>
    </section>

    <!-- OP STACK — foot-anchored, beside the source -->
    <section class="panel p-stack">
      <div class="sheet-tabs"><button class="st-tab" type="button" data-sheet="stack">Stack</button><button class="st-tab" type="button" data-sheet="code">Code</button><button class="st-tab" type="button" data-sheet="menu">Menu</button><button class="st-x" type="button" data-sheet-close aria-label="Close">&#10005;</button></div>
      <div class="barhead">Op Stack &middot; foot-anchored

<script>
"use strict";
/* =====================================================================
   PART A — BEFLIX RUNTIME v2  (1-bit ordered-dither plotter)
   ===================================================================== */
const G_DEFAULT = 64, MAX_EXEC_MS = 3000, MAX_FRAMES = 600;
const perf = () => (typeof performance!=="undefined" ? performance.now() : Date.now());
let RNG = Math.random;                      // overridable for tests
function setRNG(fn){ RNG = fn; }

class BelixError extends Error{ constructor(m,c){ super(m); this.name="BelixError"; this.code=c; } }

/* dither matrices */
const B2 = [[0,2],[3,1]];
const B4 = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
const B8 = (function(){ function grow(M){ const n=M.length,R=[]; for(let y=0;y<2*n;y++){R[y]=[];for(let x=0;x<2*n;x++){
  const base=4*M[y%n][x%n]; const q=(Math.floor(y/n)*2+Math.floor(x/n)); const add=[0,2,3,1][q]; R[y][x]=base+add; }} return R; }
  return grow(B4); })();
const DITHER = { bayer2:B2, bayer4:B4, bayer8:B8, threshold:B4, none:B4 };
function hashNoise(x,y){ const s=Math.sin(x*12.9898+y*78.233)*43758.5453; return s-Math.floor(s); }

/* expression evaluator: numbers, vars, frame, + - * / ( ), funcs */
const FN = { sin:Math.sin, cos:Math.cos, tan:Math.tan, abs:Math.abs, sqrt:Math.sqrt,
  floor:Math.floor, ceil:Math.ceil, round:Math.round, sign:Math.sign,
  min:Math.min, max:Math.max, random:Math.random, pow:Math.pow, hypot:Math.hypot,
  mod:(a,b)=> b===0?0:((a%b)+b)%b };
function evalExpr(src, env){
  if(src==null) return 0;
  const s=String(src); let i=0;
  const ws=()=>{ while(i<s.length && (s[i]===' '||s[i]==='\t')) i++; };
  function expr(){ let v=term(); ws(); while(s[i]==='+'||s[i]==='-'){ const o=s[i++]; const r=term(); v=o==='+'?v+r:v-r; ws(); } return v; }
  function term(){ let v=factor(); ws(); while(s[i]==='*'||s[i]==='/'){ const o=s[i++]; const r=factor(); v=o==='*'?v*r:(r!==0?v/r:0); ws(); } return v; }
  function factor(){ ws();
    if(s[i]==='+'){ i++; return factor(); }
    if(s[i]==='-'){ i++; return -factor(); }
    if(s[i]==='('){ i++; const v=expr(); ws(); if(s[i]===')') i++; return v; }
    const num=/^[0-9]*\.?[0-9]+/.exec(s.slice(i));
    if(num){ i+=num[0].length; return parseFloat(num[0]); }
    const id=/^[a-zA-Z_][a-zA-Z0-9_.]*/.exec(s.slice(i));
    if(id){ i+=id[0].length; ws();
      if(s[i]==='('){ i++; const a=[]; ws(); if(s[i]!==')'){ a.push(expr()); ws(); while(s[i]===','){ i++; a.push(expr()); ws(); } } if(s[i]===')') i++;
        const f=FN[id[0]]; return f? f.apply(null,a) : 0; }
      return lookup(id[0]); }
    return 0;
  }
  function lookup(name){
    if(name==='frame') return env.frame||0;
    if(name==='pi') return Math.PI;
    if(name==='tau') return 2*Math.PI;
    return (env.vars && env.vars[name]!==undefined) ? env.vars[name] : 0;
  }
  ws(); const v=expr(); return isFinite(v)?v:0;
}

/* compiled expression -> closure (S has {x,y,frame,vars}); used by FIELD per-pixel */
const _fieldCache=new Map();
function compileExpr(src){
  const s=String(src==null?"0":src); let i=0;
  const ws=()=>{ while(i<s.length && (s[i]===' '||s[i]==='\t')) i++; };
  function expr(){ let a=term(); ws(); while(s[i]==='+'||s[i]==='-'){ const o=s[i++]; const b=term(); const A=a,B=b; a=o==='+'?(S)=>A(S)+B(S):(S)=>A(S)-B(S); ws(); } return a; }
  function term(){ let a=factor(); ws(); while(s[i]==='*'||s[i]==='/'){ const o=s[i++]; const b=factor(); const A=a,B=b; a=o==='*'?(S)=>A(S)*B(S):(S)=>{const d=B(S);return d!==0?A(S)/d:0;}; ws(); } return a; }
  function factor(){ ws();
    if(s[i]==='+'){ i++; return factor(); }
    if(s[i]==='-'){ i++; const fn=factor(); return (S)=>-fn(S); }
    if(s[i]==='('){ i++; const e=expr(); ws(); if(s[i]===')') i++; return e; }
    const num=/^[0-9]*\.?[0-9]+/.exec(s.slice(i)); if(num){ i+=num[0].length; const v=parseFloat(num[0]); return ()=>v; }
    const id=/^[a-zA-Z_][a-zA-Z0-9_.]*/.exec(s.slice(i));
    if(id){ i+=id[0].length; ws();
      if(s[i]==='('){ i++; const args=[]; ws(); if(s[i]!==')'){ args.push(expr()); ws(); while(s[i]===','){ i++; args.push(expr()); ws(); } } if(s[i]===')') i++;
        const fn=FN[id[0]]||(()=>0); return (S)=>fn.apply(null, args.map(a=>a(S))); }
      const nm=id[0]; return (S)=> nm==='x'?S.x : nm==='y'?S.y : nm==='frame'?S.frame : nm==='pi'?Math.PI : nm==='tau'?6.283185307 : (S.vars&&S.vars[nm]!==undefined?S.vars[nm]:0);
    }
    return ()=>0;
  }
  ws(); const fn=expr(); return (S)=>{ const v=fn(S); return isFinite(v)?v:0; };
}
function compileField(src){ let f=_fieldCache.get(src); if(!f){ f=compileExpr(src); _fieldCache.set(src,f); } return f; }

/* arg splitter: respects quotes + paren depth */
function splitArgs(s){
  const out=[]; let depth=0,q=null,cur="";
  for(let i=0;i<s.length;i++){ const c=s[i];
    if(q){ cur+=c; if(c===q) q=null; continue; }
    if(c==='"'||c==="'"){ q=c; cur+=c; continue; }
    if(c==='('){ depth++; cur+=c; continue; }
    if(c===')'){ depth--; cur+=c; continue; }
    if(c===',' && depth===0){ out.push(cur.trim()); cur=""; continue; }
    cur+=c;
  }
  if(cur.trim()!=="") out.push(cur.trim());
  return out;
}

/* lexer */
const PRIM_SET = new Set(["FILL","GRAD","PLOT","LINE","RECT","FRAME","DISC","RING","TEXT","DRAW","ANIMATE","MAP","FRAME_COUNT","DITHER","SET","FIELD","POLY","TRI","SCATTER"]);
function tokenizeLine(line){
  const t=line.trim();
  if(!t || t.startsWith("**") || t.startsWith("#") || t.startsWith("//")) return {tag:"IGNORE"};
  if(t==="*END_READOUT*") return {tag:"END"};
  let body=t;
  if(t.startsWith("ANI:")) body=t.slice(4).trim();
  else if(t.startsWith("BEFLIX_CMD:")) body=t.slice(11).trim();

  const sprDef=body.match(/^SPRITE\s+([A-Za-z_]\w*)/i);
  if(sprDef) return {tag:"SPRITE_DEF", name:sprDef[1]};
  const procDef=body.match(/^DEF\s+([A-Za-z_]\w*)\s*\(([^)]*)\)/i);
  if(procDef) return {tag:"PROC_DEF", name:procDef[1], params:procDef[2].split(",").map(x=>x.trim()).filter(Boolean)};

  const ifInline=body.match(/^IF\s+(.+?)\s*->\s*(.+)$/i);
  if(ifInline) return {tag:"IF", condition:ifInline[1].trim(), body:ifInline[2].trim()};
  if(/^IF\b/i.test(body)){ const ib=body.match(/\{(.*)\}\s*$/); const c=body.replace(/^IF\s+/i,"").replace(/\{.*$/,"").trim(); return {tag:"IF_BLOCK", condition:c, inline: ib? ib[1].trim() : null}; }
  if(/^FOR\b/i.test(body)){ const ib=body.match(/\{(.*)\}\s*$/); return {tag:"FOR", raw:body.replace(/\{.*$/,"").trim(), inline: ib? ib[1].trim() : null}; }
  if(/^CALL\b/i.test(body)){ const rest=body.replace(/^CALL\s+/i,""); const inner=rest.replace(/^[^(]*\(/,"").replace(/\)\s*$/,""); return {tag:"CALL", fn:rest.split("(")[0].trim(), args:splitArgs(inner)}; }

  const prim=body.match(/^([A-Za-z_][A-Za-z0-9_]*)\s*\((.*)\)\s*$/);
  if(prim){ const cmd=prim[1].toUpperCase(); if(PRIM_SET.has(cmd)) return {tag:"PRIM", command:cmd, args:splitArgs(prim[2])}; }

  const asg=body.match(/^([a-zA-Z_][a-zA-Z0-9_.]*)\s*([\+\-\*\/]?=)\s*(.+)$/);
  if(asg) return {tag:"ASSIGN", target:asg[1], op:asg[2], expr:asg[3].trim()};

  const hdr=t.match(/^([A-Z_]+):\s+(.+)$/);
  if(hdr) return {tag:"HEADER", key:hdr[1], value:hdr[2].trim()};
  return {tag:"IGNORE"};
}

function parseForHeader(raw){
  let m=raw.match(/^FOR\s+([a-zA-Z_]\w*)\s+IN\s+(-?\d+(?:\.\d+)?)\s*\.\.\s*(-?\d+(?:\.\d+)?)/i);
  if(m) return { range:true, varName:m[1], from:parseFloat(m[2]), to:parseFloat(m[3]) };
  m=raw.match(/^FOR\s+(\d+)/i);
  if(m) return { range:false, count:parseInt(m[1],10) };
  return { range:false, count:1 };
}

/* parser: every node carries .line */
function parseBelixSource(source){
  const lines=source.split("\n");
  const program={ cellId:"", territory:"", animSource:"", nodes:[], sprites:{}, procs:{} };
  let cursor=0;
  function parseBlock(){
    const body=[];
    while(cursor<lines.length){
      const lineNo=cursor+1; const t=lines[cursor].trim(); cursor++;
      if(t==="}") break;
      if(!t || t==="{") continue;
      const node=resolveToken(tokenizeLine(t), lineNo);
      if(node) body.push(...(Array.isArray(node)?node:[node]));
    }
    return body;
  }
  function parseInline(str, lineNo){
    const out=[];
    // split top-level statements on ';' (respect parens/quotes/braces)
    const parts=[]; let depth=0,q=null,cur="";
    for(let i=0;i<str.length;i++){ const c=str[i];
      if(q){ cur+=c; if(c===q) q=null; continue; }
      if(c==='"'||c==="'"){ q=c; cur+=c; continue; }
      if(c==='('||c==='{'){ depth++; cur+=c; continue; }
      if(c===')'||c==='}'){ depth--; cur+=c; continue; }
      if(c===';'&&depth===0){ if(cur.trim()) parts.push(cur.trim()); cur=""; continue; }
      cur+=c;
    }
    if(cur.trim()) parts.push(cur.trim());
    for(const p of parts){ const node=resolveToken(tokenizeLine(p), lineNo); if(node) out.push(...(Array.isArray(node)?node:[node])); }
    return out;
  }
  function resolveToken(tok, lineNo){
    switch(tok.tag){
      case "PRIM":   return { kind:tok.command, args:tok.args, line:lineNo };
      case "ASSIGN": return { kind:"ASSIGN", target:tok.target, op:tok.op, expr:tok.expr, line:lineNo };
      case "CALL":   return { kind:"CALL", fn:tok.fn, args:tok.args, line:lineNo };
      case "FOR":    { const h=parseForHeader(tok.raw); const b = tok.inline!=null ? parseInline(tok.inline, lineNo) : parseBlock(); return Object.assign({kind:"FOR", body:b, line:lineNo}, h); }
      case "IF":     { const inner=resolveToken(tokenizeLine(tok.body), lineNo); const body=inner? [].concat(inner):[]; return { kind:"IF", condition:tok.condition, body, line:lineNo }; }
      case "IF_BLOCK": { const b = tok.inline!=null ? parseInline(tok.inline, lineNo) : parseBlock(); return { kind:"IF", condition:tok.condition, body:b, line:lineNo }; }
      default: return null;
    }
  }
  while(cursor<lines.length){
    const lineNo=cursor+1; const t=lines[cursor].trim(); cursor++;
    if(!t) continue;
    const tok=tokenizeLine(t);
    if(tok.tag==="END") break;
    if(tok.tag==="IGNORE") continue;
    if(tok.tag==="HEADER"){
      if(tok.key==="CELL_ID") program.cellId=tok.value;
      else if(tok.key==="TERRITORY") program.territory=tok.value;
      else if(tok.key==="ANIM_SOURCE") program.animSource=tok.value;
      continue;
    }
    if(tok.tag==="SPRITE_DEF"){ const rows=[]; while(cursor<lines.length){ const raw=lines[cursor]; const tt=raw.trim(); cursor++; if(tt==="}") break; if(tt==="{"||tt==="") { if(tt==="}") break; continue; } rows.push(raw.replace(/\t/g,"  ")); } program.sprites[tok.name]={rows}; continue; }
    if(tok.tag==="PROC_DEF"){ const body=parseBlock(); program.procs[tok.name]={params:tok.params, body}; continue; }
    const node=resolveToken(tok, lineNo);
    if(node) program.nodes.push(...(Array.isArray(node)?node:[node]));
  }
  return program;
}

/* sprite registry (tone sprites 0..1) */
function spriteFromAscii(rows, map){
  const m=Object.assign({ '#':1, '*':0.85, '+':0.6, ':':0.35, '.':0, ' ':0 }, map||{});
  const h=rows.length, w=Math.max.apply(null, rows.map(r=>r.length));
  const tone=new Float32Array(w*h);
  for(let y=0;y<h;y++){ const r=rows[y]; for(let x=0;x<w;x++){ const ch=r[x]||' '; tone[y*w+x]=m[ch]!==undefined?m[ch]:0; } }
  return { w, h, tone };
}
class SpriteRegistry{
  constructor(){ this.store=new Map(); }
  registerStatic(id, spr){ this.store.set(id, { kind:"static", spr }); }
  registerAnim(id, frames){ this.store.set(id, { kind:"animated", frames }); }
  getRaw(id){ return this.store.get(id)||null; }
  get(id){ const e=this.store.get(id); if(!e) return this.placeholder(id); return e.kind==="static"? e.spr : e.frames[0]; }
  placeholder(id){ const w=8,h=8,tone=new Float32Array(w*h); const hsh=[...String(id)].reduce((a,c)=>a+c.charCodeAt(0),0);
    const t=0.35+((hsh%5)*0.12); for(let p=0;p<w*h;p++) tone[p]= ((p%2)^(Math.floor(p/w)%2))? t:0; return {w,h,tone}; }
}

/* execution deadline */
class ExecutionDeadline{
  constructor(ms=MAX_EXEC_MS){ this.limit=ms; this.start=perf(); }
  check(at){ if(perf()-this.start>this.limit) throw new BelixError("BEFLIX timeout after "+this.limit+" ms"+(at?" (at "+at+")":""),"TIMEOUT"); }
  get elapsed(){ return perf()-this.start; }
}

/* renderer: tone buffer -> 1-bit dither; tracks per-op bind boxes */
class Renderer{
  constructor(g){ this.g=g; this.tone=new Float32Array(g*g); this.dither="bayer4"; this.curLine=-1; this.box=null; this.frameBoxes=[]; }
  clearFrame(){ this.tone.fill(0); this.frameBoxes=[]; this.dither="bayer4"; }
  beginOp(line){ this.curLine=line; this.box=null; }
  endOp(){ if(this.box && this.curLine>=0){ const b=this.box; this.frameBoxes.push({line:this.curLine,x:b.x0,y:b.y0,w:b.x1-b.x0+1,h:b.y1-b.y0+1}); } this.curLine=-1; this.box=null; }
  _mark(x,y){ if(x<0||y<0||x>=this.g||y>=this.g) return; if(!this.box) this.box={x0:x,y0:y,x1:x,y1:y};
    else{ if(x<this.box.x0)this.box.x0=x; if(y<this.box.y0)this.box.y0=y; if(x>this.box.x1)this.box.x1=x; if(y>this.box.y1)this.box.y1=y; } }
  _markRegion(x,y,w,h){ const x2=Math.min(this.g-1,x+w-1), y2=Math.min(this.g-1,y+h-1); x=Math.max(0,Math.round(x)); y=Math.max(0,Math.round(y)); if(x>x2||y>y2) return; this._mark(x,y); this._mark(x2,y2); }
  set(x,y,t){ x=Math.round(x); y=Math.round(y); if(x<0||y<0||x>=this.g||y>=this.g) return; this.tone[y*this.g+x]=t; this._mark(x,y); }
  poke(x,y,t){ x=Math.round(x); y=Math.round(y); if(x<0||y<0||x>=this.g||y>=this.g) return; this.tone[y*this.g+x]=t; }
  fill(t){ this.tone.fill(t); this._markRegion(0,0,this.g,this.g); }
  grad(x,y,w,h,t0,t1){ x=Math.round(x);y=Math.round(y);w=Math.round(w);h=Math.round(h);
    for(let yy=0;yy<h;yy++){ const f=h<=1?0:yy/(h-1); const t=t0+(t1-t0)*f; for(let xx=0;xx<w;xx++) this.poke(x+xx,y+yy,t); } this._markRegion(x,y,w,h); }

    miny=Math.max(0,Math.floor(miny)); maxy=Math.min(this.g-1,Math.ceil(maxy));
    for(let y=miny;y<=maxy;y++){ const xs=[]; for(let i=0;i<pts.length;i++){ const a=pts[i], b=pts[(i+1)%pts.length]; if((a.y<=y&&b.y>y)||(b.y<=y&&a.y>y)){ xs.push(a.x+(y-a.y)/(b.y-a.y)*(b.x-a.x)); } } xs.sort((p,q)=>p-q); for(let i=0;i+1<xs.length;i+=2){ const x0=Math.round(xs[i]), x1=Math.round(xs[i+1]); for(let x=x0;x<=x1;x++) this.set(x,y,t); } }
    for(let i=0;i<pts.length;i++){ const a=pts[i], b=pts[(i+1)%pts.length]; this.line(a.x,a.y,b.x,b.y,t); } }
  rect(x,y,w,h,t){ x=Math.round(x);y=Math.round(y);w=Math.round(w);h=Math.round(h); for(let yy=0;yy<h;yy++)for(let xx=0;xx<w;xx++)this.set(x+xx,y+yy,t); }
  frame(x,y,w,h,t){ x=Math.round(x);y=Math.round(y);w=Math.round(w);h=Math.round(h);
    for(let xx=0;xx<w;xx++){ this.set(x+xx,y,t); this.set(x+xx,y+h-1,t); } for(let yy=0;yy<h;yy++){ this.set(x,y+yy,t); this.set(x+w-1,y+yy,t); } }
  disc(cx,cy,r,t){ cx=Math.round(cx);cy=Math.round(cy);r=Math.round(r); for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++) if(dx*dx+dy*dy<=r*r) this.set(cx+dx,cy+dy,t); }
  ring(cx,cy,r,t){ cx=Math.round(cx);cy=Math.round(cy);r=Math.round(r); const steps=Math.max(10,Math.round(6.283*r)); for(let i=0;i<steps;i++){ const a=i/steps*6.283; this.set(cx+Math.cos(a)*r, cy+Math.sin(a)*r, t); } }
  line(x0,y0,x1,y1,t){ x0=Math.round(x0);y0=Math.round(y0);x1=Math.round(x1);y1=Math.round(y1);
    let dx=Math.abs(x1-x0),dy=-Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx+dy,guard=0;
    while(guard++<5000){ this.set(x0,y0,t); if(x0===x1&&y0===y1) break; const e2=2*err; if(e2>=dy){err+=dy;x0+=sx;} if(e2<=dx){err+=dx;y0+=sy;} } }
  text(x,y,str,t,size){ try{ this._text(x,y,str,t,size); }catch(e){} }
  _text(x,y,str,t,size){ size=Math.max(4,Math.round(size||6)); if(typeof OffscreenCanvas==="undefined") return;
    const w=Math.ceil(str.length*size*0.62)+2, h=size+2; const c=new OffscreenCanvas(w,h); const cx=c.getContext("2d");
    if(!cx||!cx.fillText) return; cx.clearRect(0,0,w,h); cx.fillStyle="#000"; cx.textBaseline="top"; cx.font=size+"px ui-monospace, monospace"; cx.fillText(String(str),1,1);
    const d=cx.getImageData(0,0,w,h).data; for(let yy=0;yy<h;yy++)for(let xx=0;xx<w;xx++){ const a=d[(yy*w+xx)*4+3]; if(a>40) this.set(x+xx,y+yy, t*(a/255)); } }
  blitSprite(spr,x,y){ if(!spr) return; x=Math.round(x);y=Math.round(y); for(let yy=0;yy<spr.h;yy++)for(let xx=0;xx<spr.w;xx++){ const v=spr.tone[yy*spr.w+xx]; if(v>0.001) this.set(x+xx,y+yy,v); } }
  capture(){ const g=this.g, img=new ImageData(g,g), M=DITHER[this.dither]||B4, n=M.length, hard=(this.dither==="threshold"||this.dither==="none");
    for(let y=0;y<g;y++)for(let x=0;x<g;x++){ let t=this.tone[y*g+x]; if(t<0)t=0; if(t>1)t=1;
      let thr = hard?0.5 : (this.dither==="noise"? hashNoise(x,y) : (M[y%n][x%n]+0.5)/(n*n));
      const c = (t>thr)?0:255; const i=(y*g+x)*4; img.data[i]=c; img.data[i+1]=c; img.data[i+2]=c; img.data[i+3]=255; }
    return img; }
}
/* interpreter */
function applyOp(cur,op,val){ switch(op){ case "=":return val; case "+=":return cur+val; case "-=":return cur-val; case "*=":return cur*val; case "/=":return val!==0?cur/val:cur; default:return cur; } }

class BelixRuntime{
  execute(program, sprites, g){
    g = g||G_DEFAULT;
    const deadline=new ExecutionDeadline(), renderer=new Renderer(g);
    const frames=[], boxesPerFrame=[], spritesUsed=new Set(), animationsUsed=new Set();
    let frameCount=1, error;
    for(const node of program.nodes) if(node.kind==="FRAME_COUNT") frameCount=Math.max(1,Math.min(Math.round(evalExpr((node.args||[])[0],{frame:0,vars:{}})||1), MAX_FRAMES));
    const localStore=new Map();
    if(program.sprites) for(const nm in program.sprites){ try{ localStore.set(nm,{spr:spriteFromAscii(program.sprites[nm].rows)}); }catch(e){} }
    const baseS=sprites;
    const runSprites={ get:(id)=>{ const e=localStore.get(id); return e? e.spr : baseS.get(id); }, getRaw:(id)=> (localStore.get(id)? {kind:"static",spr:localStore.get(id).spr} : baseS.getRaw(id)), placeholder:(id)=> baseS.placeholder(id) };
    const ctx={ frame:0, frameCount, renderer, sprites:runSprites, deadline, vars:{}, spritesUsed, animationsUsed, procs:program.procs||{}, callDepth:0 };
    try{
      for(let f=0; f<frameCount; f++){
        ctx.frame=f; renderer.clearFrame(); deadline.check("frame "+f);
        for(const node of program.nodes) this.execNode(node, ctx);
        frames.push(renderer.capture());
        boxesPerFrame.push(renderer.frameBoxes.slice());
      }
    }catch(err){ error = err instanceof BelixError ? err.message : String(err); }
    return { cellId:program.cellId, frames, frameCount:frames.length, boxesPerFrame,
      metadata:{ territory:program.territory, executionTimeMs:deadline.elapsed,
        spritesUsed:[...spritesUsed], animationsUsed:[...animationsUsed], error } };
  }
  execNode(node, ctx){
    const r=ctx.renderer, A=node.args||[];
    const env={ frame:ctx.frame, vars:ctx.vars };
    const n=(i,d)=> (A[i]!==undefined ? evalExpr(A[i], env) : d);
    const nm=(i)=> (A[i]!==undefined ? String(A[i]).replace(/^['"]|['"]$/g,"").trim() : "");
    switch(node.kind){
      case "FRAME_COUNT": break;
      case "DITHER": r.dither = nm(0)||"bayer4"; break;
      case "SET": ctx.vars[nm(0)] = n(1,0); break;
      case "FILL": r.beginOp(node.line); r.fill(n(0,0)); r.endOp(); break;
      case "GRAD": r.beginOp(node.line); r.grad(n(0,0),n(1,0),n(2,r.g),n(3,r.g),n(4,0),n(5,1)); r.endOp(); break;
      case "PLOT": r.beginOp(node.line); r.set(n(0,0),n(1,0),n(2,1)); r.endOp(); break;
      case "LINE": r.beginOp(node.line); r.line(n(0,0),n(1,0),n(2,0),n(3,0),n(4,1)); r.endOp(); break;
      case "RECT": r.beginOp(node.line); r.rect(n(0,0),n(1,0),n(2,1),n(3,1),n(4,1)); r.endOp(); break;
      case "FRAME": r.beginOp(node.line); r.frame(n(0,0),n(1,0),n(2,1),n(3,1),n(4,1)); r.endOp(); break;
      case "DISC": r.beginOp(node.line); r.disc(n(0,0),n(1,0),n(2,1),n(3,1)); r.endOp(); break;
      case "RING": r.beginOp(node.line); r.ring(n(0,0),n(1,0),n(2,1),n(3,1)); r.endOp(); break;
      case "TEXT": r.beginOp(node.line); r.text(n(0,0),n(1,0),nm(2),n(3,1),n(4,6)); r.endOp(); break;
      case "DRAW": { r.beginOp(node.line); ctx.spritesUsed.add(nm(0)); r.blitSprite(ctx.sprites.get(nm(0)), n(1,0), n(2,0)); r.endOp(); break; }
      case "ANIMATE": { r.beginOp(node.line); const id=nm(0); ctx.animationsUsed.add(id); const e=ctx.sprites.getRaw(id);
        let s = (e&&e.kind==="animated") ? e.frames[ctx.frame % e.frames.length] : ctx.sprites.get(id); r.blitSprite(s, n(1,0), n(2,0)); r.endOp(); break; }
      case "MAP": { r.beginOp(node.line); const s=ctx.sprites.get(nm(4)); const x=n(0,0),y=n(1,0),w=n(2,8),h=n(3,8);
        for(let yy=0;yy<h;yy++)for(let xx=0;xx<w;xx++){ const sx=Math.floor(xx*s.w/w), sy=Math.floor(yy*s.h/h); const v=s.tone[sy*s.w+sx]; if(v>0.001) r.set(x+xx,y+yy,v); } r.endOp(); break; }
      case "FIELD": { r.beginOp(node.line); const fexp=compileField(A[0]!==undefined?A[0]:"0"); const g=r.g; const S={x:0,y:0,frame:ctx.frame,vars:ctx.vars};
        for(let y=0;y<g;y++){ S.y=y; for(let x=0;x<g;x++){ S.x=x; r.poke(x,y, fexp(S)); } } r._markRegion(0,0,g,g); r.endOp(); break; }
      case "SCATTER": { r.beginOp(node.line); const x=n(0,0),y=n(1,0),w=n(2,8),h=n(3,8),den=n(4,0.3),t=n(5,1);
        for(let yy=0;yy<h;yy++)for(let xx=0;xx<w;xx++){ if(hashNoise((x+xx)*1.7+0.3,(y+yy)*1.3+0.7)<den) r.poke(x+xx,y+yy,t); } r._markRegion(x,y,w,h); r.endOp(); break; }
      case "POLY": case "TRI": { r.beginOp(node.line); const vals=A.map(a=>evalExpr(a,env)); let tone=1, coords=vals;
        if(vals.length%2===1){ tone=vals[vals.length-1]; coords=vals.slice(0,-1); }
        const pts=[]; for(let k=0;k+1<coords.length;k+=2) pts.push({x:coords[k],y:coords[k+1]}); r.polygon(pts,tone); r.endOp(); break; }
      case "ASSIGN": { const cur=ctx.vars[node.target]||0; ctx.vars[node.target]=applyOp(cur,node.op, evalExpr(node.expr, env)); break; }
      case "IF": if(this.evalCond(node.condition, ctx)) for(const c of node.body) this.execNode(c, ctx); break;
      case "FOR":
        if(node.range){ const from=node.from, to=node.to; for(let v=from; v<=to; v++){ ctx.deadline.check("FOR"); ctx.vars[node.varName]=v; for(const c of node.body) this.execNode(c, ctx); } }
        else { const cnt=Math.max(0, node.count||1); for(let k=0;k<cnt;k++){ ctx.deadline.check("FOR"); for(const c of node.body) this.execNode(c, ctx); } }
        break;
      case "CALL": this.execCall(node.fn, node.args, ctx); break;
    }
  }
  evalCond(cond, ctx){
    const env={ frame:ctx.frame, vars:ctx.vars }; const c=String(cond).trim();
    if(c==="DEF"||c==="1"||c==="true") return true; if(c==="0"||c==="false") return false;
    const m=c.match(/^(.+?)(>=|<=|==|!=|>|<)(.+)$/);
    if(m){ const a=evalExpr(m[1],env), b=evalExpr(m[3],env); switch(m[2].trim()){ case ">":return a>b; case "<":return a<b; case ">=":return a>=b; case "<=":return a<=b; case "==":return a===b; case "!=":return a!==b; } }
    return evalExpr(c, env)!==0;
  }
  execCall(fn, args, ctx){
    const proc = ctx.procs && ctx.procs[fn];
    if(proc){ if((ctx.callDepth||0)>32) return; const saved=ctx.vars; const local=Object.create(saved);
      proc.params.forEach((p,k)=>{ local[p]= args[k]!==undefined? evalExpr(args[k], {frame:ctx.frame,vars:saved}) : 0; });
      ctx.vars=local; ctx.callDepth=(ctx.callDepth||0)+1;
      for(const nd of proc.body) this.execNode(nd, ctx);
      ctx.callDepth--; ctx.vars=saved; return; }
    switch(fn){ case "dynamic_recalc": ctx.vars["tile_id"]=Math.sin(ctx.frame*0.2)*10; break; default: break; }
  }
}

class CellExecutor{
  constructor(opts){ opts=opts||{}; this.runtime=new BelixRuntime(); this.sprites=opts.sprites||new SpriteRegistry(); }
  parse(source){ const p=parseBelixSource(source); if(!p.cellId) throw new BelixError("Missing CELL_ID header","PARSE_ERROR"); return p; }
  executeCell(source, g){ if(isB128(source)) return runB128(source, { g: g||B128_GRID }); return this.runtime.execute(this.parse(source), this.sprites, g||G_DEFAULT); }
  recompileCell(source, g){ return this.executeCell(source, g); }
}

/* animation player (DOM) */
class AnimationPlayer{
  constructor(output, canvas, fps, scale){
    this.output=output; this.idx=0; this.raf=null; this.last=0; this.scale=scale||6; this.fps=fps||12; this.mpf=1000/this.fps;
    this.g = output.frames.length? output.frames[0].width : G_DEFAULT;
    canvas.width=this.g*this.scale; canvas.height=this.g*this.scale;
    const ctx=canvas.getContext("2d"); ctx.imageSmoothingEnabled=false; this.ctx=ctx; this.onFrame=null;
  }
  setFps(f){ this.fps=f; this.mpf=1000/f; }
  play(){ if(this.raf!==null || !this.output.frames.length) return; this.last=perf(); this.raf=requestAnimationFrame(t=>this.tick(t)); }
  pause(){ if(this.raf!==null) cancelAnimationFrame(this.raf); this.raf=null; }
  stop(){ this.pause(); this.idx=0; this.render(); this.emit(); }
  get playing(){ return this.raf!==null; }
  get total(){ return this.output.frames.length; }
  get boxes(){ return this.output.boxesPerFrame[this.idx]||[]; }
  seek(i){ if(!this.output.frames.length) return; const t=this.output.frames.length; this.idx=((i%t)+t)%t; this.render(); this.emit(); }
  tick(now){ if(now-this.last>=this.mpf){ this.render(); this.idx=(this.idx+1)%this.output.frames.length; this.last=now; this.emit(); } this.raf=requestAnimationFrame(t=>this.tick(t)); }
  render(){ const fr=this.output.frames[this.idx]; if(!fr) return; const tmp=new OffscreenCanvas(fr.width,fr.height); tmp.getContext("2d").putImageData(fr,0,0);
    this.ctx.imageSmoothingEnabled=false; this.ctx.clearRect(0,0,this.g*this.scale,this.g*this.scale); this.ctx.drawImage(tmp,0,0,this.g*this.scale,this.g*this.scale); }
  emit(){ if(this.onFrame) this.onFrame(this.idx, this.total); }
}

/* =====================================================================
   BEFLIX-128 — the classic Knowlton accumulate-and-record dialect.
   One command per line ( C / c begins a comment ):
     CLR i                 clear the whole field to intensity i (0..7)
     PNT x y w h i         paint a filled block
     LIN x1 y1 x2 y2 i     draw a line
     REC n                 emit the field, as it stands, for n frames
   The field PERSISTS between records (you draw on top), exactly like the
   original cells; intensities 0..7 map to tone i/7 and are ordered-dithered
   to 1-bit at capture. 0 = paper, 7 = full ink. This is the scene standard.
   ===================================================================== */
const B128_GRID = 128;
function isB128(src){ return /^[ \t]*REC[ \t]+\d/im.test(src) || /@BEFLIX-?128/i.test(src); }
function parseB128(source){
  const lines = String(source).split(/\r?\n/), ops = []; let cellId = "SCENE", territory = "";
  for(let i=0;i<lines.length;i++){
    const ln = lines[i].trim(); if(!ln) continue;
    if(/^c\b/i.test(ln)){
      const mc = ln.match(/@CELL\s+([A-Za-z0-9_]+)/i); if(mc) cellId = mc[1];
      const mt = ln.match(/@TERR\s+([A-Za-z0-9_]+)/i); if(mt) territory = mt[1];
      continue;
    }
    const t = ln.split(/[ \t]+/), cmd = t[0].toUpperCase(), a = t.slice(1).map(Number);
    if(cmd==="CLR")      ops.push({op:"CLR", i:a[0]|0, line:i+1});
    else if(cmd==="PNT") ops.push({op:"PNT", x:a[0]|0,y:a[1]|0,w:Math.max(1,a[2]|0),h:Math.max(1,a[3]|0), i:a[4]|0, line:i+1});
    else if(cmd==="LIN") ops.push({op:"LIN", x1:a[0]|0,y1:a[1]|0,x2:a[2]|0,y2:a[3]|0, i:a[4]|0, line:i+1});
    else if(cmd==="REC") ops.push({op:"REC", n:Math.max(1,a[0]|0||1), line:i+1});
    /* unknown verbs are ignored — forward compatible */
  }
  return { cellId, territory, ops };
}
function runB128(source, opts){
  opts = opts||{}; const g = opts.g||B128_GRID, dither = opts.dither||"bayer8";
  const prog = parseB128(source), r = new Renderer(g); r.dither = dither;
  const deadline = new ExecutionDeadline(), frames = [], boxesPerFrame = [], t0 = perf();
  const T = i => Math.max(0, Math.min(7, i))/7;
  for(const o of prog.ops){
    deadline.check("B128");
    if(o.op==="CLR")      { r.fill(T(o.i)); }                                              // clear: no bind box
    else if(o.op==="PNT") { r.beginOp(o.line); r.rect(o.x,o.y,o.w,o.h,T(o.i)); r.endOp(); }
    else if(o.op==="LIN") { r.beginOp(o.line); r.line(o.x1,o.y1,o.x2,o.y2,T(o.i)); r.endOp(); }
    else if(o.op==="REC") { const boxes = r.frameBoxes.slice();                            // every line drawn so far
      for(let k=0;k<o.n && frames.length<MAX_FRAMES;k++){ frames.push(r.capture()); boxesPerFrame.push(boxes); } }
  }
  if(!frames.length){ frames.push(r.capture()); boxesPerFrame.push(r.frameBoxes.slice()); }
  return { cellId:prog.cellId, frames, frameCount:frames.length, boxesPerFrame, ops:prog.ops,
           metadata:{ territory:prog.territory||prog.cellId, executionTimeMs:perf()-t0, dither, spritesUsed:new Set(), animationsUsed:new Set(), error:null } };
}

/* =====================================================================
   PART C — GAME ENGINE (pure logic; DOM-free, testable)
   ===================================================================== */
function newGame(){
  const loc={};
  for(const id in ITEMS) loc[id]=ITEMS[id].start;
  return { here:"WEST_OF_HOUSE", loc, flags:{ sack_open:false }, score:0, moves:0,
    lampOn:false, lampTurns:160, dead:false, won:false, visited:{}, last:"", darkMoves:0,
    scoredTake:{}, scoredCase:{} };
}
function itemsAt(state, place){ const r=[]; for(const id in state.loc) if(state.loc[id]===place) r.push(id); return r; }
function lightHere(state){
  const l=state.loc.lamp; if(state.lampOn && (l==="INV"||l===state.here)) return true;
  const tr=state.loc.torch; if(tr==="INV"||tr===state.here) return true;   // burning torch
  return false;
}
function isDark(state){ return !!ROOMS[state.here].dark && !lightHere(state); }
function treasuresInCase(state){ let n=0; for(const id in ITEMS) if(ITEMS[id].treasure && state.loc[id]==="trophy_case") n++; return n; }
function totalTreasures(){ let n=0; for(const id in ITEMS) if(ITEMS[id].treasure) n++; return n; }

function computeScope(state){
  const set=new Set();
  for(const id in state.loc){ const p=state.loc[id]; if(p==="INV"||p===state.here) set.add(id); }
  for(const f of (ROOMS[state.here].fixtures||[])) set.add(f);
  if(state.flags.rug_moved) set.add("trap_door");
  // open container contents in scope
  for(const id of [...set]){ const it=ITEMS[id]; if(it && it.container){ const open = id==="trophy_case" ? state.flags.case_open : id==="mailbox" ? state.flags.mailbox_open : id==="sack" ? state.flags.sack_open : id==="bottle" ? true : false;
    if(open) for(const c of itemsAt(state,id)) set.add(c); } }
  return set;
}
function resolveItem(state, text){
  if(!text) return null; const t=" "+text.toLowerCase().replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim()+" ";
  const scope=computeScope(state); let best=null, bestLen=0;
  for(const id of scope){ const it=ITEMS[id]; if(!it) continue;
    for(const s of it.syn){ if(t.indexOf(" "+s+" ")>=0 && s.length>bestLen){ best=id; bestLen=s.length; } } }
  return best;
}
function scopeNouns(state){
  const out=[]; const seen=new Set();
  for(const id of computeScope(state)){ const it=ITEMS[id]; if(!it) continue;
    for(const s of it.syn){ if(s.length>=3 && !seen.has(s)){ seen.add(s); out.push({word:s, id}); } } }
  out.sort((a,b)=>b.word.length-a.word.length);
  return out;
}

/* dynamic exits (gated by flags) */
function getExits(state){
  const e=Object.assign({}, ROOMS[state.here].exits||{});
  if(state.here==="BEHIND_HOUSE" && state.flags.window_open) e.in="KITCHEN";
  if(state.here==="KITCHEN" && state.flags.window_open) e.out="BEHIND_HOUSE";
  if(state.here==="LIVING_ROOM"){ if(state.flags.rug_moved && state.flags.trap_open) e.d="CELLAR"; else delete e.d;
    if(state.flags.cyclops_fled) e.w="CYCLOPS_ROOM"; }   // strange passage
  if(state.here==="CYCLOPS_ROOM" && state.flags.cyclops_fled){ e.u="TREASURE_ROOM"; e.e="LIVING_ROOM"; }
  if(state.here==="DOME_ROOM" && state.flags.rope_tied) e.d="TORCH_ROOM";
  return e;
}

   emitted reactively (light, creatures, treasures, doors). Builds up with
   the accumulate+record model; 0 = paper, 7 = ink, ground plane ~ y100.

function B128(){ const L=[]; return {
  c:(s)=>{ L.push("C "+s); },
  clr:(i)=>{ L.push("CLR "+(i|0)); },
  pnt:(x,y,w,h,i)=>{ L.push("PNT "+(x|0)+" "+(y|0)+" "+Math.max(1,w|0)+" "+Math.max(1,h|0)+" "+(i|0)); },
  lin:(a,b,c,d,i)=>{ L.push("LIN "+(a|0)+" "+(b|0)+" "+(c|0)+" "+(d|0)+" "+(i|0)); },
  rec:(n)=>{ L.push("REC "+Math.max(1,n|0)); },
  out:()=>L.join("\n") }; }
function treasuresHere(state){ const t=[]; for(const id in ITEMS) if(ITEMS[id].treasure && state.loc[id]===state.here) t.push(id); return t; }

function cellSource(state){
  const b=B128(); let id, terr;
  if(state.dead){ id="DEAD"; terr="VOID"; }
  else if(state.won){ id="VICTORY"; terr="VICTORY"; }
  else if(isDark(state)){ id="DARK"; terr=ROOMS[state.here].terr||"UNDER"; }
  else { id=state.here; terr=ROOMS[state.here].terr||id; }
  b.c("@CELL "+id+" @TERR "+terr);
  b.c("BEFLIX-128 \u00b7 "+ (ROOMS[state.here]?ROOMS[state.here].name:id));
  if(state.dead) SCENE_DEAD(b,state);
  else if(state.won) SCENE_WON(b,state);
  else if(isDark(state)) SCENE_DARK(b,state);
  else (SCENES128[state.here]||SCENE_GENERIC)(b,state);
  return b.out();
}

/* room description block */
function describeRoom(state, brief){
  const lines=[]; const room=ROOMS[state.here];
  if(isDark(state)){
    lines.push({room:room.name});
    lines.push({text:"It is pitch dark. You can see nothing. Something unseen may be waiting."});
    return lines;
  }
  lines.push({room:room.name});
  if(!brief || !state.visited[state.here]) lines.push({text:room.desc});
  // notable loose items in the room
  const loose=itemsAt(state, state.here).filter(id=>{ const it=ITEMS[id]; return it && it.takeable; });
  for(const id of loose) lines.push({text:"There is a "+ITEMS[id].name+" here."});
  // open container reveals
  for(const fx of (room.fixtures||[])){ const it=ITEMS[fx]; if(it&&it.container){ const open = fx==="mailbox"?state.flags.mailbox_open : fx==="sack"?state.flags.sack_open : fx==="trophy_case"?state.flags.case_open : false;
    if(open){ const inside=itemsAt(state,fx); if(inside.length) lines.push({text:"The "+it.name+" contains: "+inside.map(i=>ITEMS[i].name).join(", ")+"."}); } } }
  if(state.flags.rug_moved && !state.flags.trap_open && state.here==="LIVING_ROOM") lines.push({text:"A closed trap door is set into the floor where the rug lay."});
  const ex=getExits(state); const dirs=Object.keys(ex).filter(d=>ex[d]!=="__BOARDED__").map(d=>DIRNAME[d]);
  if(dirs.length) lines.push({exits:dirs});
  return lines;
}
/* the command processor */
function handleCommand(state, raw){
  const out=[]; let change=false;
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(state.dead){ push("You are no longer among the living. Type RESTART to begin again."); if(/^\s*restart\s*$/i.test(raw)){ return {restart:true}; } return {lines:out,change}; }
  if(state.won){ if(/^\s*restart\s*$/i.test(raw)){ return {restart:true}; } push("You have already triumphed. Type RESTART to play again."); return {lines:out,change}; }

  let s=String(raw).toLowerCase().trim();
  if(!s){ push("I beg your pardon?"); return {lines:out,change}; }
  if(s==="g"||s==="again"){ if(!state.last){ push("There is nothing to repeat."); return {lines:out,change}; } s=state.last; }
  else state.last=s;

  // multi-word normalisations
  s=s.replace(/\blook at\b/g,"examine").replace(/\blook inside\b/g,"search").replace(/\blook in\b/g,"search")
     .replace(/\bpick up\b/g,"take").replace(/\bput down\b/g,"drop")
     .replace(/\bturn on\b/g,"lampon").replace(/\bturn off\b/g,"lampoff")
     .replace(/\bswitch on\b/g,"lampon").replace(/\bswitch off\b/g,"lampoff");
  let toks=s.split(/\s+/).filter(w=>!["the","a","an","at","to","my","of"].includes(w));
  if(!toks.length){ push("I beg your pardon?"); return {lines:out,change}; }
  let verb=toks[0]; const rest=toks.slice(1).join(" ");

  // direction shortcut
  if(DIRSYN[verb] && toks.length===1) return move(state, DIRSYN[verb], out);
  if(["go","walk","run","head","travel"].includes(verb) && toks[1] && DIRSYN[toks[1]]) return move(state, DIRSYN[toks[1]], out);
  if(verb==="enter"||verb==="in") return move(state, "in", out);
  if(verb==="exit"||verb==="out"||verb==="leave") return move(state, "out", out);

  const noun=()=>resolveItem(state, rest);

  switch(verb){
    case "look": case "l":
      if(rest){ examine(state, noun(), rest, out); } else { for(const ln of describeRoom(state,false)) push(ln); } break;
    case "examine": case "x": case "inspect": case "read": {
      const id=noun();
      if(verb==="read"){ readItem(state, id, rest, out); } else { examine(state, id, rest, out); } break; }
    case "search": { const id=noun(); searchItem(state, id, rest, out); break; }
    case "take": case "get": case "grab": case "carry": case "pick": { const r=take(state, noun(), rest, out); change = change||r; break; }
    case "drop": case "release": case "discard": { const r=drop(state, noun(), rest, out); change=change||r; break; }
    case "open": { const r=openClose(state, noun(), rest, true, out); change=change||r; break; }
    case "close": { const r=openClose(state, noun(), rest, false, out); change=change||r; break; }
    case "move": case "push": case "pull": case "shift": case "slide": { const r=pushItem(state, noun(), rest, out); change=change||r; break; }
    case "put": case "insert": case "place": { const r=putItem(state, rest, out); change=change||r; break; }
    case "turn": {
      if(/\bon\b/.test(rest)){ const r=lamp(state,true,out); change=change||r; }
      else if(/\boff\b/.test(rest)){ const r=lamp(state,false,out); change=change||r; }
      else push("Turn it on, or off?"); break; }
    case "lampon": case "light": case "activate": { const r=lamp(state,true,out); change=change||r; break; }
    case "lampoff": case "extinguish": case "douse": { const r=lamp(state,false,out); change=change||r; break; }
    case "inventory": case "i": case "inv": inventory(state, out); break;
    case "score": push("Your score is "+state.score+" of 50, in "+state.moves+" moves. You are rated: "+rankFor(state.score)+"."); break;
    case "attack": case "kill": case "hit": case "fight": case "strike": case "slay": { const r=attack(state, rest, out); change=change||r; break; }
    case "eat": case "devour": case "bite": eatItem(state, noun(), rest, out); break;
    case "drink": case "sip": drinkItem(state, noun(), rest, out); break;
    case "climb": if(getExits(state).u){ return move(state,"u",out); } push("There is nothing to climb here."); break;
    case "wait": case "z": { const r=waitTurn(state, out); change=change||r; break; }
    case "help": case "?": case "commands": helpText(out); break;
    case "say": case "speak": case "chant": case "shout": case "yell": { const r=sayWord(state, rest||toks[0], out); change=change||r; break; }
    case "ulysses": case "odysseus": case "ulisses": { const r=sayWord(state, verb, out); change=change||r; break; }
    case "tie": case "fasten": case "attach": { const r=tieRope(state, rest, out); change=change||r; break; }
    case "pray": case "kneel": case "worship": { const r=pray(state, out); change=change||r; break; }
    case "give": case "offer": case "feed": { const r=giveItem(state, rest, out); change=change||r; break; }
    case "diagnose": push("You are "+(state.dead?"dead":"in good health")+". You have taken "+state.moves+" turns."); break;
    case "restart": return {restart:true};
    default: push("I don't know how to \""+verb+"\".");
  }
  return {lines:out, change};
}

function move(state, dir, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  // troll blocks all passages
  if(state.here==="TROLL_ROOM" && !state.flags.troll_dead){ push("The troll bars your way, axe raised. You'll not pass while he stands."); return {lines:out,change:false}; }
  // cyclops blocks all passages until he flees
  if(state.here==="CYCLOPS_ROOM" && !state.flags.cyclops_fled){ push("The cyclops blocks the way, glaring with his single bloodshot eye. He will not let you pass."); return {lines:out,change:false}; }
  // chimney from the studio is too tight if heavily laden or without light
  if(state.here==="STUDIO" && dir==="u"){
    const carried=itemsAt(state,"INV").length;
    if(isDark(state)){ /* dark handled below */ }
    if(carried>2){ push("The chimney is far too narrow to climb while carrying so much. You can manage two items at most."); return {lines:out,change:false}; }
  }
  // grue check when leaving a dark, unlit room
  if(isDark(state)){
    const p=0.30+0.18*state.darkMoves; state.darkMoves++;
    if(RNG()<p){ state.dead=true; push("You stumble through the blackness — and something with too many teeth finds you first. You have been eaten."); push({dead:true}); state.moves++; return {lines:out,change:true}; }
    push("You grope blindly through the dark, heart pounding.");
  }
  const ex=getExits(state); const dest=ex[dir];
  if(!dest){ push("You can't go that way."); return {lines:out,change:false}; }
  if(dest==="__BOARDED__"){ push("The front door is boarded shut, and the boards will not give."); return {lines:out,change:false}; }
  // perform
  state.here=dest; state.moves++; tickLamp(state, push);
  if(!isDark(state)) state.darkMoves=0;
  for(const ln of describeRoom(state, true)) push(ln);
  state.visited[dest]=true;
  return {lines:out, change:true};
}

function tickLamp(state, push){
  if(state.lampOn){ state.lampTurns--;
    if(state.lampTurns===30) push("The lantern's flame wavers — perhaps half its oil remains.");
    else if(state.lampTurns===12) push("The lantern is noticeably dimmer now.");
    else if(state.lampTurns===4) push("The lantern gutters; it will not last much longer.");
    else if(state.lampTurns<=0){ state.lampOn=false; push("The lantern flares once and dies. Darkness rushes in."); }
  }
}

function examine(state, id, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(!id){ if(rest) push("You can't see any "+rest+" here."); else push("Examine what?"); return; }
  const it=ITEMS[id]; let d=it.desc;
  if(id==="lamp") d+= state.lampOn? " It is lit, casting a steady glow." : " It is currently dark.";
  if(id==="window") d+= state.flags.window_open? " It stands open." : " It is shut.";
  if(id==="sword" && (isDark(state)||state.here==="TROLL_ROOM"||state.here==="CELLAR")) d+= " The blade glows with a faint blue light.";
  if(id==="troll" && state.flags.troll_dead) { push("There is no troll here now — only a hanging fog where he fell."); return; }
  push(d);
  if(it.container){ const open = id==="mailbox"?state.flags.mailbox_open : id==="sack"?state.flags.sack_open : id==="trophy_case"?state.flags.case_open : id==="bottle"?true:false;
    if(open){ const inside=itemsAt(state,id); push(inside.length? "It contains: "+inside.map(i=>ITEMS[i].name).join(", ")+"." : "It is empty."); }
    else push("It is closed."); }
}
function readItem(state, id, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(!id){ push("Read what?"); return; }
  const it=ITEMS[id]; if(it.read) push(it.read); else push("There is nothing written on the "+it.name+".");
}
function searchItem(state, id, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(!id){ push("Search what?"); return; }
  const it=ITEMS[id];
  if(it.container){ const inside=itemsAt(state,id); push(inside.length? "Inside the "+it.name+" you see: "+inside.map(i=>ITEMS[i].name).join(", ")+"." : "The "+it.name+" is empty."); }
  else push("You find nothing of interest.");
}
function take(state, id, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(!id){ push(rest? "You can't see any "+rest+" here." : "Take what?"); return false; }
  const it=ITEMS[id];
  if(state.loc[id]==="INV"){ push("You're already carrying the "+it.name+"."); return false; }
  if(!it.takeable){ push("You can't take the "+it.name+"."); return false; }
  // must be reachable: in room, or in an open container in scope
  const where=state.loc[id];
  if(where!==state.here){ const cont=ITEMS[where]; const open = where==="mailbox"?state.flags.mailbox_open : where==="sack"?state.flags.sack_open : where==="trophy_case"?state.flags.case_open : where==="bottle"?true:false;
    if(!cont || !open){ push("You can't reach the "+it.name+"."); return false; } }
  state.loc[id]="INV";
  if(it.treasure && !state.scoredTake[id]){ state.scoredTake[id]=true; state.score+=it.takePts||0; }
  push("Taken.");
  return true;
}
function drop(state, id, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(!id || state.loc[id]!=="INV"){ push("You aren't carrying that."); return false; }
  state.loc[id]=state.here; push("Dropped."); return true;
}
function openClose(state, id, rest, opening, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(!id){ push((opening?"Open":"Close")+" what?"); return false; }
  const it=ITEMS[id];
  if(id==="window"){ if(opening===!!state.flags.window_open){ push("The window is already "+(opening?"open":"closed")+"."); return false; }
    state.flags.window_open=opening; push(opening? "With some effort the window slides open, revealing a passage into the kitchen." : "The window slides shut."); return true; }
  if(id==="trap_door"){ if(!state.flags.rug_moved){ push("You see no trap door."); return false; }
    if(opening===!!state.flags.trap_open){ push("The trap door is already "+(opening?"open":"closed")+"."); return false; }
    state.flags.trap_open=opening; push(opening? "The trap door creaks open, revealing a dark staircase descending." : "The trap door falls shut."); return true; }
  if(it.container){ const key = id==="mailbox"?"mailbox_open" : id==="sack"?"sack_open" : id==="trophy_case"?"case_open" : null;
    if(!key){ push("You can't open that."); return false; }
    if(opening===!!state.flags[key]){ push("It is already "+(opening?"open":"closed")+"."); return false; }
    state.flags[key]=opening;
    if(opening){ const inside=itemsAt(state,id); push("Opened."+(inside.length? " It contains: "+inside.map(i=>ITEMS[i].name).join(", ")+"." : " It is empty.")); }
    else push("Closed.");
    return true; }
  push("You can't open the "+it.name+"."); return false;
}
function pushItem(state, id, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(!id){ push("Move what?"); return false; }
  if(id==="rug"){ if(state.flags.rug_moved){ push("The rug is already pushed aside; a trap door lies beneath it."); return false; }
    state.flags.rug_moved=true; push("You drag the heavy rug aside, revealing a closed trap door set into the floor."); return true; }
  push("Pushing the "+ITEMS[id].name+" accomplishes nothing."); return false;
}
function putItem(state, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  const m=rest.split(/\s+\bin(?:to)?\b\s+/);
  if(m.length<2){ push("Put what where? (try: put painting in case)"); return false; }
  const id=resolveItem(state, m[0]); const targetId=resolveItem(state, m[1]);
  if(!id || state.loc[id]!=="INV"){ push("You aren't carrying that."); return false; }
  if(!targetId){ push("You can't see that here."); return false; }
  const tgt=ITEMS[targetId];
  if(!tgt.container){ push("You can't put anything in the "+tgt.name+"."); return false; }
  if(targetId==="trophy_case"){ if(!state.flags.case_open){ push("The trophy case is closed."); return false; }
    state.loc[id]="trophy_case"; let msg="You place the "+ITEMS[id].name+" inside the trophy case.";
    if(ITEMS[id].treasure && !state.scoredCase[id]){ state.scoredCase[id]=true; state.score+=ITEMS[id].casePts||0; }
    push(msg);
    if(treasuresInCase(state)===totalTreasures()){ state.won=true; state.score+=10;
      push({win:true}); push("Every lost treasure is now locked safe behind glass. The house hums with old magic, and a voice you cannot place says: well done, adventurer. You have restored CINEOSIS. (+10 bonus)"); }
    return true; }
  const key = targetId==="sack"?"sack_open" : targetId==="mailbox"?"mailbox_open" : null;
  if(key && !state.flags[key]){ push("The "+tgt.name+" is closed."); return false; }
  state.loc[id]=targetId; push("Done."); return true;
}
function lamp(state, on, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  const l=state.loc.lamp; if(l!=="INV" && l!==state.here){ push("You don't have the lantern."); return false; }
  if(on && state.lampTurns<=0){ push("The lantern is spent; it gives no light."); return false; }
  if(state.lampOn===on){ push("The lantern is already "+(on?"on":"off")+"."); return false; }
  state.lampOn=on; push(on? "The lantern is now on, throwing a warm circle of light." : "The lantern is now off."); return true;
}
function inventory(state, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  const inv=itemsAt(state,"INV"); if(!inv.length){ push("You are empty-handed."); return; }
  push("You are carrying:"); for(const id of inv) push("  - "+ITEMS[id].name + (id==="lamp"&&state.lampOn?" (lit)":""));
}
function bladeInHand(state){ return state.loc.sword==="INV" ? "sword" : (state.loc.knife==="INV" ? "knife" : (state.loc.stiletto==="INV" ? "stiletto" : null)); }
function attack(state, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  const m=rest.split(/\s+\bwith\b\s+/);
  const targetId=resolveItem(state, m[0]||rest);
  const weaponId=m[1]?resolveItem(state,m[1]):bladeInHand(state);
  if(targetId==="troll"){
    if(state.flags.troll_dead){ push("The troll is already dead."); return false; }
    if(weaponId!=="sword" || state.loc.sword!=="INV"){ push("Bare-handed against an axe is a short story with a bad ending. The troll swings — only a quick stumble backward saves you. Find a proper blade."); return false; }
    push("The elvish blade flares blue. You parry the troll's first blow in a shower of sparks.");
    if(RNG()<0.35) push("His axe grazes your arm — a shallow, stinging cut.");
    push("Your second thrust finds its mark. The troll shrieks, drops his axe, and dissolves into a cloud of sinister black fog. The passages are clear.");
    state.flags.troll_dead=true; return true;
  }
  if(targetId==="thief"){
    if(state.flags.thief_dead){ push("The thief is already dead."); return false; }
    if(!weaponId){ push("You have no weapon. The thief laughs, and his stiletto draws a thin line of blood across your knuckles."); return false; }
    // the thief is quick: a sharp blade (sword/knife/stiletto) usually wins, with a real chance he wounds you
    push("You lunge at the thief. He is quick — blades flash and scrape.");
    const r=RNG();
    if(r<0.65){
      push("Your blow lands true. The thief gasps, staggers, and collapses among his loot, which spills across the floor. A crystal skull rolls free.");
      state.flags.thief_dead=true; state.loc.skull=state.here; // drop his hoard
      return true;
    } else if(r<0.9){
      push("He parries, grinning, and nicks your forearm. Try again."); return true;
    } else {
      state.dead=true; push("The thief is faster than you. His stiletto finds your heart, and the den goes dark. You have been killed."); push({dead:true}); return true;
    }
  }
  if(targetId==="cyclops"){ push("The cyclops swats your weapon aside as if it were a twig. Steel will not save you here — perhaps a word might."); return false; }
  if(targetId){ push("Violence against the "+ITEMS[targetId].name+" seems unwise."); return false; }
  push("Attack what?"); return false;
}
function eatItem(state, id, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(!id){ push("Eat what?"); return; } const it=ITEMS[id];
  if(!it.edible){ push("The "+it.name+" is hardly appetising."); return; }
  if(state.loc[id]!=="INV"){ push("You're not holding that."); return; }
  state.loc[id]="__GONE__"; push(id==="lunch"? "You wolf the sandwich. The pepper sets your whole head alight — bracing!" : "You eat the "+it.name+". Pungent, but oddly fortifying.");
}
function drinkItem(state, id, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(id!=="water"){ push("You can't drink that."); return; }
  const b=state.loc.bottle; if(b!=="INV" && b!==state.here){ push("You have no water to drink."); return; }
  if(state.loc.water!=="bottle"){ push("The bottle is empty."); return; }
  state.loc.water="__GONE__"; push("You drink the water. Refreshing.");
}
function waitTurn(state, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(isDark(state)){ const p=0.30+0.18*state.darkMoves; state.darkMoves++;
    if(RNG()<p){ state.dead=true; push("You wait in the dark — a mistake. Something closes its jaws around you. You have been eaten."); push({dead:true}); state.moves++; return true; }
    push("You wait, tense, in the smothering dark."); state.moves++; return true; }
  push("Time passes."); state.moves++; tickLamp(state,push); return true;
}
function helpText(out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  push("COMMANDS — move: n s e w ne nw se sw up down · in · out");
  push("  look (l) · examine X (x) · read X · search X · inventory (i) · score");
  push("  take X · drop X · open X · close X · move X · put X in Y");
  push("  turn on lamp · turn off lamp · attack troll with sword · eat X · drink X · wait (z) · again (g)");
  push("Object names in the transcript are clickable — the text is a control surface. So is the BEFLIX source on the right: click a line to bind its box in the cell, or click the cell to find the line.");

}
function sayWord(state, word, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  const w=(word||"").toLowerCase().replace(/[^a-z]/g,"");
  if(state.here==="CYCLOPS_ROOM" && !state.flags.cyclops_fled && (w==="ulysses"||w==="odysseus"||w==="ulisses")){
    state.flags.cyclops_fled=true;
    push("At the sound of his ancient enemy's name the cyclops blanches, bellows, and flees — smashing clean through the east wall. Beyond, a staircase rises, and a strange passage now leads back toward the living room.");
    return true;
  }
  if(w) push("\""+w+"\" echoes off the stone and fades. Nothing happens.");
  else push("Say what?");
  return false;
}
function tieRope(state, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(!/rope/.test(rest||"")){ push("Tie what?"); return false; }
  if(state.loc.rope!=="INV"){ push("You aren't carrying the rope."); return false; }
  if(state.here!=="DOME_ROOM"){ push("There is nothing here worth tying a rope to."); return false; }
  if(state.flags.rope_tied){ push("The rope is already tied to the railing."); return false; }
  state.flags.rope_tied=true; state.loc.rope="DOME_ROOM";
  push("You make the rope fast to the wooden railing and drop the loose end over the rim. It hangs down into the dark — you could climb down now.");
  return true;
}
function pray(state, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  if(state.here==="TEMPLE"){
    state.here="FOREST_1"; state.moves++; state.darkMoves=0;
    push("You kneel at the altar and bow your head. The temple seems to fold around you — and between one breath and the next you are standing, blinking, in open daylight.");
    for(const ln of describeRoom(state,true)) push(ln);
    state.visited.FOREST_1=true; return true;
  }
  push("You pray. It is good for the soul, if nothing else.");
  return false;
}
function giveItem(state, rest, out){
  const push=(o)=>out.push(typeof o==="string"?{text:o}:o);
  const m=rest.split(/\s+\bto\b\s+/); const id=resolveItem(state,m[0]); const tgt=m[1]?resolveItem(state,m[1]):null;
  if(tgt==="cyclops" && !state.flags.cyclops_fled){
    push("The cyclops snatches whatever you offer and devours it, then looks hungrier than before. Food will not move him — but a certain name might."); return false; }
  if(tgt==="thief" && !state.flags.thief_dead){
    if(id && ITEMS[id].treasure && state.loc[id]==="INV"){ state.loc[id]="TREASURE_ROOM"; push("The thief accepts your "+ITEMS[id].name+" with an ironic little bow, and tucks it away. Unwise."); return true; }
    push("The thief raises an eyebrow, unimpressed."); return false; }
  if(!id || state.loc[id]!=="INV"){ push("You aren't carrying that."); return false; }
  push("There is no one here who wants it."); return false;
}

/* =====================================================================
   EXPORT BUILDERS — Twine .twee + standalone HTML branch map
